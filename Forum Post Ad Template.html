/* ───── CSV parser (handles quoted values with commas/newlines) ───── */
function parseCsv(text){
  const rows = []; let row=[], cell='', inQ=false;
  for (let i=0; i<text.length; i++){
    const c = text[i];
    if (inQ){
      if (c === '"' && text[i+1] === '"'){ cell+='"'; i++; }
      else if (c === '"'){ inQ=false; }
      else cell+=c;
    } else {
      if (c === '"'){ inQ=true; }
      else if (c === ','){ row.push(cell); cell=''; }
      else if (c === '\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if (c === '\r'){ /* skip */ }
      else cell+=c;
    }
  }
  if (cell.length || row.length){ row.push(cell); rows.push(row); }
  return rows.filter(r => r.some(x => x && x.trim().length));
}

            display:'inline-flex', alignItems:'center', gap:10,
            background: theme.accent, color:'#fff',
            padding:'12px 16px 12px 14px', borderRadius:999,
            fontFamily:'"Geist", system-ui, sans-serif', fontSize: isStory ? 22 : 20, fontWeight:600,
          }}>
            {Icon.upArrow('#fff')}
            <span>{variation.upvotes}</span>
            <div style={{ width:1, height:18, background:'rgba(255,255,255,.35)', margin:'0 4px' }}/>
            {Icon.downArrow('#fff')}
          </div>
          {/* comments */}
          <Pill theme={theme}>
            {Icon.bubble(ink)} <span>{variation.comments}</span>
          </Pill>
          {/* award/ribbon */}
          <Pill theme={theme}>
            {Icon.ribbon(ink)}
          </Pill>
          {/* share */}
          <Pill theme={theme}>
            {Icon.share(ink)} <span>Share</span>
          </Pill>
          {/* more */}
          <Pill theme={theme}>
            {Icon.more(ink)}
          </Pill>
        </div>
      </div>
    </div>
  );
}

/* ────────────────────────── VARIATION CARD ────────────────────────────── */

function VariationCard({ variation, index, theme, onDelete, onDuplicate }){
  const squareRef = React.useRef(null);
  const storyRef = React.useRef(null);

  const triggerDownload = (dataUrl, name) => {
    const link = document.createElement('a');
    link.download = name; link.href = dataUrl;
    document.body.appendChild(link); link.click(); document.body.removeChild(link);
  };

  const exportPng = async (frame) => {
    const ref = frame === 'square' ? squareRef : storyRef;
    if (!ref.current) return;
    try {
      const dataUrl = await htmlToImage.toPng(ref.current, {
        pixelRatio: 2, width: FRAMES[frame].w, height: FRAMES[frame].h, cacheBust:true,
      });
      triggerDownload(dataUrl, `forum-${variation.id}-${FRAMES[frame].label.replace(':','x')}.png`);
    } catch(e){ console.error(e); alert('Export failed — see console'); }
  };

  const exportBoth = async () => {
    if (!squareRef.current || !storyRef.current) return;
    try {
      const [sq, st] = await Promise.all([
        htmlToImage.toPng(squareRef.current, { pixelRatio:2, width:FRAMES.square.w, height:FRAMES.square.h, cacheBust:true }),
        htmlToImage.toPng(storyRef.current,  { pixelRatio:2, width:FRAMES.story.w,  height:FRAMES.story.h,  cacheBust:true }),
      ]);
      triggerDownload(sq, `forum-${variation.id}-1x1.png`);
      await new Promise(r=>setTimeout(r,500));
      triggerDownload(st, `forum-${variation.id}-9x16.png`);
    } catch(e){ console.error(e); alert('Export failed — see console'); }
  };

  return (
    <div style={{ padding:20, display:'flex', flexDirection:'column', gap:14,
                  width:'100%', boxSizing:'border-box',
                  background:'#fff', borderRadius:10, border:'1px solid rgba(0,0,0,.06)',
                  boxShadow:'0 2px 10px rgba(0,0,0,.04)' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:16 }}>
        <div style={{ display:'flex', alignItems:'baseline', gap:10, flexWrap:'wrap' }}>
          <div style={{ fontSize:18, fontWeight:700, color:'#1a1612', letterSpacing:-.3 }}>Variation {index+1}</div>
          <div style={{ fontSize:11, color:'rgba(60,50,40,.55)', textTransform:'uppercase', letterSpacing:.6, fontWeight:600 }}>
            Forum post · {theme.name}
          </div>
        </div>
        <div className="v-actions">
          <button className="v-btn" onClick={()=>exportPng('square')}>Export 1:1</button>
          <button className="v-btn" onClick={()=>exportPng('story')}>Export 9:16</button>
          <button className="v-btn" onClick={exportBoth}
            style={{ background:'#13100c', color:'#fff', borderColor:'#13100c' }}>↓ Export both</button>
          <button className="v-btn subtle" onClick={onDuplicate} title="Duplicate">⧉</button>
          <button className="v-btn subtle" onClick={onDelete} title="Delete">✕</button>
        </div>
      </div>

      <div style={{ display:'flex', gap:20, alignItems:'flex-start', flexWrap:'wrap' }}>
        {['square','story'].map(frame => {
          const F = FRAMES[frame];
          const scale = F.previewW / F.w;
          return (
            <div key={frame} style={{ display:'flex', flexDirection:'column', gap:6 }}>
              <div style={{ fontSize:11, color:'rgba(60,50,40,.55)', fontWeight:600, letterSpacing:.4, textTransform:'uppercase' }}>
                {F.label} · {F.w}×{F.h}
              </div>
              <div style={{ width:F.previewW, height:F.h*scale, position:'relative', overflow:'hidden',
                            borderRadius:8, border:'1px solid rgba(0,0,0,.06)', background:'#f4f1ea' }}>
                <div ref={frame==='square' ? squareRef : storyRef}
                     style={{ width:F.w, height:F.h, transform:`scale(${scale})`, transformOrigin:'top left', position:'absolute', top:0, left:0 }}>
                  <ForumPost variation={variation} theme={theme} frame={frame} />
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ────────────────────────── TWEAKS PANEL ──────────────────────────────── */

function TweaksPanel({ state, setState, updateActiveBrand, onClose }){
  const brand = activeBrandOf(state);
  const [activeIdx, setActiveIdx] = React.useState(0);
  const csvRef = React.useRef(null);

  React.useEffect(()=>{
    if (activeIdx >= brand.variations.length) setActiveIdx(Math.max(0, brand.variations.length - 1));
  }, [brand.id, brand.variations.length]);

  const persist = (next) => {
    setState(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
  };

  const update = (i, key, value) => {
    updateActiveBrand((b)=>({ variations: b.variations.map((v,j)=> j===i ? { ...v, [key]: value } : v) }));
  };
  const setBrandField = (key, value) => updateActiveBrand(()=>({ [key]: value }));

  const addVariation = () => {
    const nv = mkVariation();
    updateActiveBrand((b)=>({ variations: [...b.variations, nv] }));
    setActiveIdx(brand.variations.length);
  };
  const duplicateActive = () => {
    const v = brand.variations[activeIdx];
    const copy = { ...v, id:`v${Math.random().toString(36).slice(2,8)}` };
    updateActiveBrand((b)=>({ variations: [...b.variations.slice(0,activeIdx+1), copy, ...b.variations.slice(activeIdx+1)] }));
    setActiveIdx(activeIdx+1);
  };
  const deleteActive = () => {
    if (brand.variations.length <= 1){ alert('Keep at least one variation'); return; }
    if (!confirm(`Delete variation ${activeIdx+1}?`)) return;
    updateActiveBrand((b)=>({ variations: b.variations.filter((_,j)=>j!==activeIdx) }));
    setActiveIdx(Math.max(0, activeIdx-1));
  };
  const resetAll = () => {
    if (!confirm('Reset to defaults?')) return;
    persist(JSON.parse(JSON.stringify(DEFAULTS)));
    setActiveIdx(0);
  };

  const onCsvFile = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => {
      const rows = parseCsv(e.target.result);
      if (!rows.length){ alert('No rows found'); return; }
      const first = rows[0].map(s=>s.toLowerCase().trim());
      const expected = ['community','handle','title','body','upvotes','comments'];
      const hasHeader = expected.some(k => first.includes(k));
      let idx = { community:0, handle:1, title:2, body:3, upvotes:4, comments:5 };
      if (hasHeader){ idx = Object.fromEntries(expected.map(k=>[k, first.indexOf(k)])); }
      const data = hasHeader ? rows.slice(1) : rows;
      updateActiveBrand(()=>({
        variations: data.map((r,i)=>{
          const get = (k) => idx[k] >= 0 ? (r[idx[k]] || '') : '';
          return mkVariation({
            id:`v${Date.now().toString(36)}${i}`,
            community: get('community') || 'biohacking',
            handle: get('handle') || 'anonymous',
            title: get('title'),
            body: get('body'),
            upvotes: get('upvotes') || '1.2K',
            comments: get('comments') || '147',
          });
        }),
      }));
      setActiveIdx(0);
    };
    r.readAsText(file);
  };

  const v = brand.variations[activeIdx];
  if (!v) return null;
  const baseTheme = THEMES[brand.theme] || THEMES.threadly;
  const theme = brand.accentOverride
    ? { ...baseTheme, accent: brand.accentOverride, markBg: brand.accentOverride }
    : baseTheme;

  return (
    <div className="tw-panel">
      <div className="tw-head">
        <div className="tw-title">Tweaks · {brand.name}</div>
        <button className="tw-close" onClick={onClose}>×</button>
      </div>

      <div className="tw-body" style={{ borderBottom:'1px solid rgba(255,255,255,.08)', paddingBottom:10, flex:'0 0 auto', maxHeight:'38vh' }}>
        <div className="tw-card">
          <div className="tw-card-head"><div className="tw-card-title" style={{ fontSize:11, letterSpacing:.6, textTransform:'uppercase', color:'rgba(255,255,255,.5)' }}>Brand</div></div>
          <div className="tw-field">
            <label className="tw-label">Brand name</label>
            <input className="tw-input" value={brand.name} onChange={(e)=>setBrandField('name', e.target.value)} />
          </div>
          <div className="tw-field" style={{ marginBottom:0 }}>
            <label className="tw-label">Forum theme</label>
            <div className="th-grid">
              {Object.values(THEMES).map(th => (
                <button key={th.id} className={`th-chip ${brand.theme === th.id ? 'active' : ''}`}
                  onClick={()=>setBrandField('theme', th.id)}>
                  <div className="th-dot" style={{ background: th.accent }}/>
                  {th.name}
                </button>
              ))}
            </div>
            <div className="tw-hint">Theme swaps platform mark, accent, wordmark. All four are original.</div>
          </div>
          <div className="tw-field" style={{ marginTop:10, marginBottom:0 }}>
            <label className="tw-label">Accent color override</label>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <input type="color" value={brand.accentOverride || baseTheme.accent}
                onChange={(e)=>setBrandField('accentOverride', e.target.value)}
                style={{ width:40, height:28, border:'none', background:'transparent', cursor:'pointer', padding:0 }} />
              <input className="tw-input" placeholder="#e07a4a"
                value={brand.accentOverride || ''}
                onChange={(e)=>setBrandField('accentOverride', e.target.value)} />
              {brand.accentOverride && (
                <button className="tw-tool" style={{ whiteSpace:'nowrap' }}
                  onClick={()=>setBrandField('accentOverride', '')}>Clear</button>
              )}
            </div>
            <div className="tw-hint">Hex code overrides the theme's accent (upvote pill + highlights).</div>
          </div>
        </div>
      </div>

      <div className="tw-toolbar">
        <input ref={csvRef} type="file" accept=".csv,text/csv" style={{ display:'none' }}
               onChange={(e)=>onCsvFile(e.target.files[0])} />
        <button className="tw-tool" onClick={()=>csvRef.current.click()}>⤓ Import CSV</button>
        <button className="tw-tool" onClick={addVariation}>+ Add</button>
        <button className="tw-tool" onClick={duplicateActive}>⧉ Duplicate</button>
        <button className="tw-tool danger" onClick={deleteActive}>✕ Delete</button>
      </div>

      <div className="tw-tabs">
        {brand.variations.map((_, i) =>
          <button key={i} className={`tw-tab ${i===activeIdx ? 'active' : ''}`} onClick={()=>setActiveIdx(i)}>V{i+1}</button>
        )}
        <button className="tw-tab add" onClick={addVariation}>+</button>
      </div>

      <div className="tw-body">
        <div className="tw-card">
          <div className="tw-card-head"><div className="tw-card-title">Variation {activeIdx+1}</div></div>

          <div className="tw-field">
            <label className="tw-label">Community (f/_____)</label>
            <input className="tw-input" value={v.community} onChange={(e)=>update(activeIdx, 'community', e.target.value)} />
          </div>
          <div className="tw-field">
            <label className="tw-label">Author handle (u/_____)</label>
            <input className="tw-input" value={v.handle} onChange={(e)=>update(activeIdx, 'handle', e.target.value)} />
          </div>
          <div className="tw-field">
            <label className="tw-label">Post title</label>
            <textarea className="tw-textarea" value={v.title} onChange={(e)=>update(activeIdx, 'title', e.target.value)} />
          </div>
          <div className="tw-field">
            <label className="tw-label">Post body</label>
            <textarea className="tw-textarea" style={{ minHeight: 90 }} value={v.body} onChange={(e)=>update(activeIdx, 'body', e.target.value)} />
          </div>
          <div style={{ display:'flex', gap:8 }}>
            <div className="tw-field" style={{ flex:1 }}>
              <label className="tw-label">Upvotes</label>
              <input className="tw-input" value={v.upvotes} onChange={(e)=>update(activeIdx, 'upvotes', e.target.value)} />
            </div>
            <div className="tw-field" style={{ flex:1 }}>
              <label className="tw-label">Comments</label>
              <input className="tw-input" value={v.comments} onChange={(e)=>update(activeIdx, 'comments', e.target.value)} />
            </div>
          </div>
          <div className="tw-hint">CSV columns: community, handle, title, body, upvotes, comments</div>
        </div>
      </div>

      <div className="tw-footer">
        <span style={{ flex:1 }}>All copy & theme saves to disk</span>
        <button onClick={resetAll}>Reset all</button>
      </div>
    </div>
  );
}

/* ────────────────────────── BRAND SWITCHER ────────────────────────────── */

function BrandSwitcher({ state, onSelect, onAdd, onRename, onDelete }){
  const [renamingId, setRenamingId] = React.useState(null);
  const [draft, setDraft] = React.useState('');
  const inputRef = React.useRef(null);

  React.useEffect(()=>{ if (renamingId && inputRef.current){ inputRef.current.focus(); inputRef.current.select(); } }, [renamingId]);

  const commitRename = () => { if (renamingId && draft.trim()) onRename(renamingId, draft.trim()); setRenamingId(null); };

  return (
    <div style={{ position:'fixed', top:12, left:'50%', transform:'translateX(-50%)',
      display:'flex', alignItems:'center', gap:6, padding:6,
      background:'rgba(255,255,255,0.95)', border:'1px solid #e4e4e4', borderRadius:999,
      boxShadow:'0 4px 16px rgba(0,0,0,.08)', zIndex:50, fontSize:13, backdropFilter:'blur(8px)',
      maxWidth:'calc(100vw - 32px)', overflow:'auto' }}>
      <span style={{ padding:'0 10px', color:'#888', fontSize:11, letterSpacing:.6, textTransform:'uppercase' }}>Brand</span>
      {state.brands.map(b => {
        const active = b.id === state.activeBrandId;
        if (renamingId === b.id) return (
          <input key={b.id} ref={inputRef} value={draft}
            onChange={(e)=>setDraft(e.target.value)}
            onBlur={commitRename}
            onKeyDown={(e)=>{ if(e.key==='Enter') commitRename(); if(e.key==='Escape') setRenamingId(null); }}
            style={{ padding:'6px 12px', borderRadius:999, border:'1px solid #e07a4a', fontSize:13, outline:'none', minWidth:120 }}/>
        );
        return (
          <button key={b.id}
            onClick={()=>onSelect(b.id)}
            onDoubleClick={()=>{ setDraft(b.name); setRenamingId(b.id); }}
            style={{
              padding:'6px 14px', borderRadius:999,
              border:'none', cursor:'pointer',
              background: active ? '#13100c' : 'transparent',
              color: active ? '#fff' : '#333',
              fontFamily:'inherit', fontSize:13, fontWeight: active ? 600 : 500,
            }}>{b.name}</button>
        );
      })}
      <button onClick={onAdd} style={{
        padding:'6px 12px', borderRadius:999, border:'1px dashed #bbb', background:'transparent',
        color:'#888', cursor:'pointer', fontSize:13,
      }}>+ Add brand</button>
    </div>
  );
}

/* ────────────────────────── APP ───────────────────────────────────────── */

function App(){
  const [state, setState] = React.useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const persist = (next) => {
    setState(next);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
  };

  const updateActiveBrand = (fn) => {
    setState(s => {
      const next = { ...s, brands: s.brands.map(b => b.id === s.activeBrandId ? { ...b, ...fn(b) } : b) };
      window.parent.postMessage({ type:'__edit_mode_set_keys', edits: next }, '*');
      return next;
    });
  };

  const selectBrand = (id) => persist({ ...state, activeBrandId: id });
  const addBrand = () => {
    const nb = { id:`b${Date.now().toString(36)}`, name:'New brand', theme:'threadly', variations:[mkVariation()] };
    persist({ ...state, brands:[...state.brands, nb], activeBrandId: nb.id });
  };
  const renameBrand = (id, name) => persist({ ...state, brands: state.brands.map(b=>b.id===id ? { ...b, name } : b) });
  const deleteBrand = (id) => {
    if (state.brands.length <= 1){ alert('Keep at least one brand'); return; }
    if (!confirm('Delete this brand?')) return;
    const next = state.brands.filter(b=>b.id !== id);
    persist({ ...state, brands: next, activeBrandId: next[0].id });
  };

  const brand = activeBrandOf(state);
  const baseTheme = THEMES[brand.theme] || THEMES.threadly;
  const theme = brand.accentOverride
    ? { ...baseTheme, accent: brand.accentOverride, markBg: brand.accentOverride }
    : baseTheme;

  const onDeleteVariation = (i) => {
    if (brand.variations.length <= 1){ alert('Keep at least one variation'); return; }
    if (!confirm(`Delete variation ${i+1}?`)) return;
    updateActiveBrand((b)=>({ variations: b.variations.filter((_,j)=>j!==i) }));
  };
  const onDuplicateVariation = (i) => {
    const v = brand.variations[i];
    const copy = { ...v, id:`v${Math.random().toString(36).slice(2,8)}` };
    updateActiveBrand((b)=>({ variations: [...b.variations.slice(0,i+1), copy, ...b.variations.slice(i+1)] }));
  };

  return (
    <div style={{ minHeight:'100vh', background:'#efece5', paddingTop:72, paddingBottom:40 }}>
      <BrandSwitcher state={state} onSelect={selectBrand} onAdd={addBrand} onRename={renameBrand} onDelete={deleteBrand} />

      <div style={{ maxWidth:1400, margin:'0 auto', padding:'0 24px', display:'flex', flexDirection:'column', gap:20 }}>
        <div style={{ padding:'8px 4px 0' }}>
          <div style={{ fontSize:28, fontWeight:700, color:'#1a1612', letterSpacing:-.6 }}>
            {brand.name} · Forum post template
          </div>
          <div style={{ fontSize:14, color:'rgba(60,50,40,.65)', marginTop:4 }}>
            Community endorsement post format · {theme.name} platform theme · 1:1 + 9:16 export
          </div>
        </div>

        {brand.variations.map((v, i) => (
          <VariationCard key={v.id} variation={v} index={i} theme={theme}
            onDelete={()=>onDeleteVariation(i)}
            onDuplicate={()=>onDuplicateVariation(i)} />
        ))}
      </div>

      {tweaksOpen && (
        <TweaksPanel state={state} setState={persist} updateActiveBrand={updateActiveBrand}
          onClose={()=>setTweaksOpen(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
