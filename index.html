<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Resizing Engine — Scent of the Ocean</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  :root {
    --bg: #0e1013;
    --panel: #16181d;
    --panel-2: #1d2026;
    --line: #2a2e36;
    --ink: #e8eaee;
    --ink-dim: #8a8f99;
    --accent: oklch(0.72 0.14 215);
    --accent-ink: #0b1418;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, sans-serif; font-size: 14px; }
  body { min-height: 100vh; }

  header {
    border-bottom: 1px solid var(--line);
    padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 20px; background: var(--panel);
    position: sticky; top: 0; z-index: 10;
  }
  .brand { display: flex; align-items: baseline; gap: 14px; }
  .brand h1 { font-weight: 600; font-size: 16px; margin: 0; letter-spacing: -0.01em; }
  .brand .sub { color: var(--ink-dim); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; }
  .actions { display: flex; gap: 10px; align-items: center; }

  button {
    font-family: inherit; font-size: 13px; font-weight: 500;
    border: 1px solid var(--line); background: var(--panel-2); color: var(--ink);
    padding: 9px 16px; border-radius: 6px; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    display: inline-flex; align-items: center; gap: 8px;
  }
  button:hover { background: #252932; border-color: #3a3f49; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary {
    background: var(--accent); color: var(--accent-ink); border-color: transparent;
    font-weight: 600;
  }
  button.primary:hover { background: oklch(0.76 0.14 215); }

  main {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 60px);
  }
  aside {
    border-right: 1px solid var(--line);
    padding: 24px;
    background: var(--panel);
  }
  .section-title {
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-dim); margin: 0 0 12px; font-weight: 600;
  }
  .source-preview {
    border: 1px solid var(--line); border-radius: 6px; overflow: hidden;
    background: #000; margin-bottom: 20px;
  }
  .source-preview img { width: 100%; display: block; }
  .source-meta { font-size: 11px; color: var(--ink-dim); margin-top: 6px; font-variant-numeric: tabular-nums; }

  .sizes { display: flex; flex-direction: column; gap: 8px; }
  .size-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border: 1px solid var(--line); border-radius: 6px;
    background: var(--panel-2);
    font-size: 12px;
  }
  .size-row .swatch { background: #0a2540; border: 1px solid #1a3a5c; flex-shrink: 0; border-radius: 2px; }
  .size-row .meta { flex: 1; min-width: 0; }
  .size-row .meta .name { font-weight: 500; color: var(--ink); }
  .size-row .meta .dims { color: var(--ink-dim); font-size: 11px; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .size-row .status { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-dim); }
  .size-row.ready .status { color: oklch(0.78 0.15 150); }

  .info {
    margin-top: 20px; padding: 14px; border: 1px solid var(--line); border-radius: 8px;
    background: var(--panel-2);
  }
  .info p { margin: 0; color: var(--ink-dim); font-size: 12px; line-height: 1.55; }

  .canvas {
    padding: 32px;
    overflow: auto;
    background: radial-gradient(circle at 20% 0%, rgba(40,80,120,0.15), transparent 60%), var(--bg);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 28px;
    max-width: 1600px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .card-head { display: flex; justify-content: space-between; align-items: baseline; }
  .card-head .label { font-size: 13px; font-weight: 500; }
  .card-head .dims { font-size: 11px; color: var(--ink-dim); font-variant-numeric: tabular-nums; }
  .preview-wrap {
    background: #000; border-radius: 6px; overflow: hidden; position: relative;
    display: grid; place-items: center;
  }
  .preview-wrap .ph { color: var(--ink-dim); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; padding: 60px 20px; }
  .preview-wrap canvas { display: block; max-width: 100%; height: auto; }
  .card-foot { display: flex; gap: 8px; justify-content: space-between; align-items: center; }
  .card-foot .fmt { font-size: 10px; color: var(--ink-dim); letter-spacing: 0.08em; text-transform: uppercase; }
  .card-foot button { padding: 6px 10px; font-size: 11px; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--panel-2); border: 1px solid var(--line); color: var(--ink);
    padding: 10px 18px; border-radius: 6px; font-size: 12px;
    opacity: 0; transition: opacity 0.2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .spin {
    width: 12px; height: 12px; border: 2px solid currentColor;
    border-right-color: transparent; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Resizing Engine</h1>
    <span class="sub">Scent of the Ocean</span>
  </div>
  <div class="actions">
    <button id="generate" class="primary">
      <span id="gen-label">Generate all sizes</span>
    </button>
    <button id="export" disabled>Export all (.zip)</button>
  </div>
</header>

<main>
  <aside>
    <h2 class="section-title">Source creative</h2>
    <div class="source-preview">
      <img src="assets/source.jpg" alt="source" />
    </div>
    <div class="source-meta">2400 × 2400 · 1:1 JPG</div>

    <h2 class="section-title" style="margin-top: 28px;">Output sizes</h2>
    <div class="sizes" id="sizeList"></div>

    <div class="info">
      <p>Full creative preserved at each aspect ratio. The original is scaled to fit and padded with a matched ocean blue sampled from the source edges — nothing is cropped, skewed, or re-composed.</p>
    </div>
  </aside>

  <section class="canvas">
    <div class="grid" id="grid"></div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
// ---------------------------------------------------------------------------
// Smart-crop config. The source image is 2400×2400. Content is roughly:
//   - Headline "Deep tide / Freshness":   x ∈ [3%, 42%],  y ∈ [5%, 21%]
//   - Logo "AJMAL / SINCE 1951":          x ∈ [85%, 97%], y ∈ [3%, 15%]
//   - Bottle + splash:                    x ∈ [17%, 96%], y ∈ [5%, 92%]
// So almost the entire frame is "content". For non-1:1 aspects we scale to
// COVER the target (no letterboxing, no skew) and crop the excess along the
// axis that has the most slack. crop-x/crop-y are the fractional CENTER of
// the crop viewport relative to the scaled source.
// ---------------------------------------------------------------------------
const SOURCE = 'assets/source.jpg';

// For each format: 'mode' picks how to fit the source:
//   'exact'   — source aspect matches target → direct resize (1:1)
//   'fit'     — scale to CONTAIN, fill spare space with sampled ocean color
//               (preserves entire creative — headline, bottle, logo all intact)
//   'cover'   — scale to COVER, crop excess along one axis (only when the
//               cropped band contains mostly background, not content)
const FORMATS = [
  {
    id: 'square',
    name: 'Square',
    ratio: '1:1',
    w: 1200, h: 1200,
    mode: 'exact',
    filename: 'scent-of-the-ocean_1200x1200.jpg'
  },
  {
    id: 'portrait',
    name: 'Portrait',
    ratio: '4:5',
    w: 960, h: 1200,
    // Target is taller than square. Fit full source at 960 wide, letterbox
    // top/bottom (~120px each) with matched ocean blue.
    mode: 'fit',
    filename: 'scent-of-the-ocean_960x1200.jpg'
  },
  {
    id: 'vertical',
    name: 'Vertical',
    ratio: '9:16',
    w: 1080, h: 1920,
    // Fit full source at 1080 wide, letterbox top/bottom (~420px each) with
    // matched ocean blue. Full creative preserved.
    mode: 'fit',
    filename: 'scent-of-the-ocean_1080x1920.jpg'
  },
  {
    id: 'landscape',
    name: 'Landscape',
    ratio: '1.91:1',
    w: 1200, h: 628,
    // Target is much wider than tall. Fit full source at 628 high, letterbox
    // left/right with matched ocean blue. Full creative preserved.
    mode: 'fit',
    filename: 'scent-of-the-ocean_1200x628.jpg'
  }
];

// ---- load source ----
let sourceImg = null;
function loadImage(src) {
  return new Promise((resolve, reject) => {
    const im = new Image();
    im.crossOrigin = 'anonymous';
    im.onload = () => resolve(im);
    im.onerror = reject;
    im.src = src;
  });
}

// ---- UI build ----
const grid = document.getElementById('grid');
const sizeList = document.getElementById('sizeList');
const toastEl = document.getElementById('toast');
function toast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toastEl.classList.remove('show'), 2400);
}

FORMATS.forEach(f => {
  // Sidebar row
  const row = document.createElement('div');
  row.className = 'size-row';
  row.id = `row-${f.id}`;
  const ratio = f.w / f.h;
  const sw = 42;
  const sh = Math.max(8, Math.round(sw / ratio));
  row.innerHTML = `
    <div class="swatch" style="width:${sw}px;height:${sh}px"></div>
    <div class="meta">
      <div class="name">${f.name} <span style="color:var(--ink-dim);font-weight:400">· ${f.ratio}</span></div>
      <div class="dims">${f.w} × ${f.h}</div>
    </div>
    <div class="status" id="status-${f.id}">idle</div>
  `;
  sizeList.appendChild(row);

  // Grid card
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <div class="card-head">
      <div class="label">${f.name} <span style="color:var(--ink-dim);font-weight:400">· ${f.ratio}</span></div>
      <div class="dims">${f.w} × ${f.h}</div>
    </div>
    <div class="preview-wrap" id="prev-${f.id}" style="aspect-ratio: ${f.w}/${f.h}">
      <div class="ph">Press Generate</div>
    </div>
    <div class="card-foot">
      <div class="fmt">JPG · 92%</div>
      <button class="ghost" data-dl="${f.id}" disabled>Download</button>
    </div>
  `;
  grid.appendChild(card);
});

// ---- render ----
const renders = {};

function computeCover(srcW, srcH, dstW, dstH, focusX, focusY) {
  // Scale source so it COVERS the destination (both dimensions >= dst).
  const scale = Math.max(dstW / srcW, dstH / srcH);
  const scaledW = srcW * scale;
  const scaledH = srcH * scale;
  const fxS = focusX * scaledW;
  const fyS = focusY * scaledH;
  let cropX = fxS - dstW / 2;
  let cropY = fyS - dstH / 2;
  cropX = Math.max(0, Math.min(scaledW - dstW, cropX));
  cropY = Math.max(0, Math.min(scaledH - dstH, cropY));
  return {
    sx: cropX / scale,
    sy: cropY / scale,
    sw: dstW / scale,
    sh: dstH / scale
  };
}

// Progressive half-step downscale then final fit into (dstW × dstH).
// Mitigates aliasing when the source region is much bigger than the target.
function hqDownscale(srcImg, sx, sy, sw, sh, dstW, dstH) {
  let cur = document.createElement('canvas');
  cur.width = Math.round(sw); cur.height = Math.round(sh);
  cur.getContext('2d').drawImage(srcImg, sx, sy, sw, sh, 0, 0, cur.width, cur.height);
  while (cur.width * 0.5 > dstW * 1.5 && cur.height * 0.5 > dstH * 1.5) {
    const nxt = document.createElement('canvas');
    nxt.width = Math.round(cur.width * 0.5);
    nxt.height = Math.round(cur.height * 0.5);
    const nctx = nxt.getContext('2d');
    nctx.imageSmoothingQuality = 'high';
    nctx.drawImage(cur, 0, 0, nxt.width, nxt.height);
    cur = nxt;
  }
  const out = document.createElement('canvas');
  out.width = dstW; out.height = dstH;
  const octx = out.getContext('2d');
  octx.imageSmoothingEnabled = true;
  octx.imageSmoothingQuality = 'high';
  octx.drawImage(cur, 0, 0, cur.width, cur.height, 0, 0, dstW, dstH);
  return out;
}

// Sample the average color of a source edge strip. Used for matching padding.
function sampleEdgeColor(srcImg, edge) {
  // edge: 'top' | 'bottom' | 'left' | 'right'
  const c = document.createElement('canvas');
  const W = srcImg.width, H = srcImg.height;
  const stripSize = 20; // px
  let sx, sy, sw, sh;
  if (edge === 'top')    { sx = 0; sy = 0; sw = W; sh = stripSize; }
  if (edge === 'bottom') { sx = 0; sy = H - stripSize; sw = W; sh = stripSize; }
  if (edge === 'left')   { sx = 0; sy = 0; sw = stripSize; sh = H; }
  if (edge === 'right')  { sx = W - stripSize; sy = 0; sw = stripSize; sh = H; }
  c.width = sw; c.height = sh;
  c.getContext('2d').drawImage(srcImg, sx, sy, sw, sh, 0, 0, sw, sh);
  const d = c.getContext('2d').getImageData(0, 0, sw, sh).data;
  let r=0,g=0,b=0,n=0;
  for (let i = 0; i < d.length; i += 4) { r += d[i]; g += d[i+1]; b += d[i+2]; n++; }
  return [Math.round(r/n), Math.round(g/n), Math.round(b/n)];
}

// Build a vertical or horizontal gradient for padding that transitions from
// the edge color of the source into a slightly deeper version, so the pad
// doesn't look like a flat band.
function paddingGradient(ctx, x, y, w, h, color, direction) {
  // direction: 'top' (lighter near image → darker outward, going UP)
  //            'bottom' (lighter near image → darker outward, going DOWN)
  //            'left' / 'right' similar
  const [r, g, b] = color;
  const edge = `rgb(${r},${g},${b})`;
  const deep = `rgb(${Math.max(0,r-18)},${Math.max(0,g-22)},${Math.max(0,b-30)})`;
  let gx1, gy1, gx2, gy2;
  if (direction === 'top')    { gx1=x; gy1=y+h; gx2=x; gy2=y; }
  if (direction === 'bottom') { gx1=x; gy1=y;   gx2=x; gy2=y+h; }
  if (direction === 'left')   { gx1=x+w; gy1=y; gx2=x; gy2=y; }
  if (direction === 'right')  { gx1=x;   gy1=y; gx2=x+w; gy2=y; }
  const grad = ctx.createLinearGradient(gx1, gy1, gx2, gy2);
  grad.addColorStop(0, edge);
  grad.addColorStop(1, deep);
  ctx.fillStyle = grad;
  ctx.fillRect(x, y, w, h);
}

async function renderFormat(f) {
  const statusEl = document.getElementById(`status-${f.id}`);
  const rowEl = document.getElementById(`row-${f.id}`);
  statusEl.innerHTML = '<span class="spin" style="display:inline-block;vertical-align:-1px;color:var(--accent)"></span>';

  const canvas = document.createElement('canvas');
  canvas.width = f.w; canvas.height = f.h;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  const srcW = sourceImg.width, srcH = sourceImg.height;

  if (f.mode === 'exact' || f.mode === 'fit') {
    // CONTAIN: fit full source inside target, preserve aspect, add padding
    const scale = Math.min(f.w / srcW, f.h / srcH);
    const drawW = Math.round(srcW * scale);
    const drawH = Math.round(srcH * scale);
    const drawX = Math.round((f.w - drawW) / 2);
    const drawY = Math.round((f.h - drawH) / 2);

    // Fill any padding with matched ocean color gradients (sampled from source edges)
    if (drawX > 0) {
      // Source is narrower than target (shouldn't happen since source is square)
      // but handle: pad left & right
      const leftColor = sampleEdgeColor(sourceImg, 'left');
      const rightColor = sampleEdgeColor(sourceImg, 'right');
      paddingGradient(ctx, 0, 0, drawX, f.h, leftColor, 'left');
      paddingGradient(ctx, drawX + drawW, 0, f.w - drawX - drawW, f.h, rightColor, 'right');
    }
    if (drawY > 0) {
      // Source is shorter than target — pad top & bottom
      const topColor = sampleEdgeColor(sourceImg, 'top');
      const bottomColor = sampleEdgeColor(sourceImg, 'bottom');
      paddingGradient(ctx, 0, 0, f.w, drawY, topColor, 'top');
      paddingGradient(ctx, 0, drawY + drawH, f.w, f.h - drawY - drawH, bottomColor, 'bottom');
    }

    // Draw the source (HQ downscaled)
    const scaled = hqDownscale(sourceImg, 0, 0, srcW, srcH, drawW, drawH);
    ctx.drawImage(scaled, drawX, drawY);
  } else if (f.mode === 'cover') {
    // COVER + focus crop (kept for future use)
    const { sx, sy, sw, sh } = computeCover(srcW, srcH, f.w, f.h, f.focusX || 0.5, f.focusY || 0.5);
    const scaled = hqDownscale(sourceImg, sx, sy, sw, sh, f.w, f.h);
    ctx.drawImage(scaled, 0, 0);
  }

  // To blob
  const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.92));
  renders[f.id] = { blob, canvas };

  // Preview
  const previewWrap = document.getElementById(`prev-${f.id}`);
  previewWrap.innerHTML = '';
  const pc = document.createElement('canvas');
  const maxPreviewW = 600;
  const scale = Math.min(1, maxPreviewW / f.w);
  pc.width = Math.round(f.w * scale);
  pc.height = Math.round(f.h * scale);
  const pctx = pc.getContext('2d');
  pctx.imageSmoothingQuality = 'high';
  pctx.drawImage(canvas, 0, 0, pc.width, pc.height);
  previewWrap.appendChild(pc);

  statusEl.textContent = 'ready';
  rowEl.classList.add('ready');
  document.querySelector(`[data-dl="${f.id}"]`).disabled = false;
}

async function generateAll() {
  const btn = document.getElementById('generate');
  const genLabel = document.getElementById('gen-label');
  btn.disabled = true;
  genLabel.innerHTML = '<span class="spin" style="display:inline-block;vertical-align:-1px"></span>&nbsp;Generating…';
  try {
    if (!sourceImg) sourceImg = await loadImage(SOURCE);
    for (const f of FORMATS) document.getElementById(`status-${f.id}`).textContent = 'pending';
    for (const f of FORMATS) await renderFormat(f);
    document.getElementById('export').disabled = false;
    toast('All 4 sizes generated');
  } catch (e) {
    console.error(e);
    toast('Error — see console');
  } finally {
    btn.disabled = false;
    genLabel.textContent = 'Regenerate';
  }
}

async function exportAll() {
  const btn = document.getElementById('export');
  const original = btn.textContent;
  btn.disabled = true;
  btn.innerHTML = '<span class="spin" style="display:inline-block;vertical-align:-1px"></span>&nbsp;Bundling…';
  try {
    const zip = new JSZip();
    const folder = zip.folder('scent-of-the-ocean');
    for (const f of FORMATS) {
      const r = renders[f.id];
      if (!r) continue;
      folder.file(f.filename, r.blob);
    }
    const manifest = FORMATS.map(f => ({
      name: f.name, ratio: f.ratio, size: `${f.w}x${f.h}`, file: f.filename
    }));
    folder.file('manifest.json', JSON.stringify(manifest, null, 2));
    const out = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(out);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'scent-of-the-ocean_creative-pack.zip';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    toast('Downloaded scent-of-the-ocean_creative-pack.zip');
  } finally {
    btn.disabled = false;
    btn.textContent = original;
  }
}

function downloadOne(id) {
  const f = FORMATS.find(x => x.id === id);
  const r = renders[id];
  if (!r) return;
  const url = URL.createObjectURL(r.blob);
  const a = document.createElement('a');
  a.href = url; a.download = f.filename;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

document.getElementById('generate').addEventListener('click', generateAll);
document.getElementById('export').addEventListener('click', exportAll);
document.addEventListener('click', e => {
  const b = e.target.closest('[data-dl]');
  if (b) downloadOne(b.dataset.dl);
});
</script>
</body>
</html>
