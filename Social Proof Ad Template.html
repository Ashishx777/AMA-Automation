  .tw-tab{border:none;background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);
    padding:5px 9px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;font-weight:500}
  .tw-tab:hover{background:rgba(255,255,255,.12);color:#fff}

  .tw-tab.add:hover{color:#fff;background:rgba(255,255,255,.08)}
  .tw-toolbar{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.08);flex-wrap:wrap}
  .tw-tool{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);border:none;
    padding:6px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:inherit;
    font-weight:500;display:inline-flex;align-items:center;gap:5px}
  .tw-tool:hover{background:rgba(255,255,255,.12);color:#fff}

  .tw-card{padding:12px 14px;margin:6px 10px;background:rgba(255,255,255,.04);border-radius:8px}

 * Each brand → variations[]. Each variation has:
 *   layout : 'card' | 'editorial' | 'tabbed'
 *   headline, body, author, rating  (0..5, half-steps)
 *   pos    : { square: {...}, story: {...} } — per-layout drag positions
 *   image  : session-only (not persisted)
 *
 * Rendered in 1:1 + 9:16 side-by-side per variation.
 * Export PNG at 2x via html-to-image.
 */

  square: { w: 1080, h: 1080, label: '1:1', previewW: 360 },
  story: { w: 1080, h: 1920, label: '9:16', previewW: 260 }

const FONTS = [
{ id: 'instrument', label: 'Instrument', stack: '"Instrument Serif", Georgia, serif' },
{ id: 'fraunces', label: 'Fraunces', stack: '"Fraunces", Georgia, serif' },
{ id: 'playfair', label: 'Playfair', stack: '"Playfair Display", Georgia, serif' },

{ id: 'system', label: 'System', stack: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif' }];

const getFont = (id) => (FONTS.find((f) => f.id === id) || FONTS[0]).stack;

   Testimonial is the only one with real layouts right now. The others are

   their layouts are built. Brand variations are now stored per ad type:

const AD_TYPES = [
  { id: 'testimonial', label: 'Testimonial', ready: true },
  { id: 'dm',          label: 'Text / DM',   ready: true },
  { id: 'review',      label: 'Review card', ready: true },
  { id: 'ui',          label: 'UI ad',       ready: true },
  { id: 'labelled',    label: 'Labelled',    ready: true },
  { id: 'forum',       label: 'Forum post',  ready: false },
  { id: 'tweet',       label: 'Tweet quote', ready: false },
  { id: 'press',       label: 'Press wall',  ready: false },
  { id: 'problemsolution', label: 'Problem / Solution', ready: true },
  { id: 'beforeafter', label: 'Before/After',ready: true },
  { id: 'starbanner',  label: 'Star banner', ready: false },
  { id: 'ama',         label: 'AMA',         ready: false },
];

function migrateBrand(b) {
  // If brand already has adTypeVariations, keep it. Otherwise lift legacy
  // `variations` into adTypeVariations.testimonial.
  if (b.adTypeVariations) return b;
  const atv = { testimonial: b.variations || [mkVariation()] };
  return { ...b, adTypeVariations: atv };
}

const getAdTypeVariations = (brand, adType) => {
  const mig = migrateBrand(brand);
  return mig.adTypeVariations[adType] || [];
};

/* activeBrandOf returns a brand with `variations` aliased to the active
   ad type's bucket. Writes to `variations` get rerouted by updateActiveBrand
   (see App) into adTypeVariations[activeAdType]. */
const activeBrandOf = (s) => {
  const raw = s.brands.find((b) => b.id === s.activeBrandId) || s.brands[0];
  const mig = migrateBrand(raw);
  const adType = s.activeAdType || 'testimonial';
  const variations = mig.adTypeVariations[adType] || [];
  return { ...mig, variations, _activeAdType: adType };
};

/* ── Image store (session-only) ── */
const ImageStore = {
  _map: {},
  set(id, d) {this._map[id] = d;this._emit();},
  get(id) {return this._map[id];},
  clear(id) {delete this._map[id];this._emit();},
  _subs: new Set(),
  _emit() {this._subs.forEach((fn) => fn());},
  subscribe(fn) {this._subs.add(fn);return () => this._subs.delete(fn);}
};
function useImageStore() {const [, f] = React.useReducer((x) => x + 1, 0);React.useEffect(() => ImageStore.subscribe(f), []);}
window.ImageStore = ImageStore;

/* ───── Draggable + resizable hotspot.
   `size` — optional { w, h } fractional width/height. If h is undefined the
   block auto-heights (intrinsic). Resize affects widthFrac and heightFrac. */
function DraggableBlock({ frac, onChange, size, onResize, frameW, frameH, editOn, children, handleLabel, widthFrac = 0.52, minWidthFrac = 0.18, maxWidthFrac = 0.98 }) {
  const ref = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const [resizing, setResizing] = React.useState(false);

  const curWidth = size && size.w || widthFrac;
  const curHeight = size && size.h; // may be undefined → auto

  const onPointerDown = (e) => {
    if (!editOn) return;
    if (e.target.classList && e.target.classList.contains('ad-resize')) return;
    e.preventDefault();
    const el = ref.current;
    const parent = el.parentElement;
    const parentRect = parent.getBoundingClientRect();
    const scale = parentRect.width / frameW;
    const elRect = el.getBoundingClientRect();
    const offX = e.clientX - elRect.left;
    const offY = e.clientY - elRect.top;
    setDragging(true);
    const onMove = (ev) => {
      const px = (ev.clientX - parentRect.left - offX) / scale;
      const py = (ev.clientY - parentRect.top - offY) / scale;
      const bw = elRect.width / scale,bh = elRect.height / scale;
      const cx = Math.max(0, Math.min(frameW - bw, px));
      const cy = Math.max(0, Math.min(frameH - bh, py));
      onChange({ x: cx / frameW, y: cy / frameH });
    };
    const onUp = () => {setDragging(false);window.removeEventListener('pointermove', onMove);window.removeEventListener('pointerup', onUp);};
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  };

  const onResizeDown = (e) => {
    if (!editOn || !onResize) return;
    e.preventDefault();e.stopPropagation();
    const el = ref.current;
    const parent = el.parentElement;
    const parentRect = parent.getBoundingClientRect();
    const scale = parentRect.width / frameW;
    const startRect = el.getBoundingClientRect();
    const startW = startRect.width / scale;
    const startX = e.clientX;
    setResizing(true);
    const onMove = (ev) => {
      const dx = (ev.clientX - startX) / scale;
      const nw = Math.max(minWidthFrac * frameW, Math.min(maxWidthFrac * frameW, startW + dx));
      onResize({ w: nw / frameW });
    };
    const onUp = () => {setResizing(false);window.removeEventListener('pointermove', onMove);window.removeEventListener('pointerup', onUp);};
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  };

  const styleObj = { left: `${frac.x * 100}%`, top: `${frac.y * 100}%`, width: `${curWidth * 100}%` };

  return (
    <div ref={ref} className={`ad-hot ${dragging ? 'dragging' : ''} ${resizing ? 'resizing' : ''}`}
    style={styleObj}
    onPointerDown={onPointerDown}>
      <div className="ad-handle">{handleLabel}</div>
      <div className="ad-hot-inner">{children}</div>
      {onResize && <div className="ad-resize" onPointerDown={onResizeDown} />}
    </div>);

}

/* ───── Ad Frame: composes one of 3 layouts over uploaded image ───── */
function AdFrame({ variation, frame, editOn, onPosChange, onResize, onImgChange, onUpload, exportRef, fontStack, fontH2, accent }) {
  useImageStore();
  const img = ImageStore.get(variation.id);
  const F = FRAMES[frame];
  const layout = variation.layout || 'card';
  const layoutPos = (variation.pos && variation.pos[layout]) || {};
  // Prefer shared buckets (_pos/_size/_img), fall back to per-frame (legacy) or defaults.
  const pos    = layoutPos._pos  || layoutPos[frame]            || (DEFAULT_POS[layout] && DEFAULT_POS[layout][frame]) || {};
  const sizes  = layoutPos._size || layoutPos[frame + '_size']  || {};
  const imgCfg = layoutPos._img  || layoutPos[frame + '_img']   || { x: 0.5, y: 0.5, scale: 1 };

  const frameRef = React.useRef(null);
  const [imgDragging, setImgDragging] = React.useState(false);

  const onImgDrag = (e) => {
    if (!editOn || !img) return;
    e.preventDefault();e.stopPropagation();
    const parentRect = frameRef.current.getBoundingClientRect();
    const scaleFactor = parentRect.width / F.w;
    const startX = e.clientX,startY = e.clientY;
    const start = { ...imgCfg };
    setImgDragging(true);
    const onMove = (ev) => {
      const dx = (ev.clientX - startX) / scaleFactor / F.w;
      const dy = (ev.clientY - startY) / scaleFactor / F.h;
      onImgChange && onImgChange({ ...start, x: Math.max(-0.5, Math.min(1.5, start.x + dx)), y: Math.max(-0.5, Math.min(1.5, start.y + dy)) });
    };
    const onUp = () => {setImgDragging(false);window.removeEventListener('pointermove', onMove);window.removeEventListener('pointerup', onUp);};
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  };

  const onImgZoom = (delta) => onImgChange && onImgChange({ ...imgCfg, scale: Math.max(0.4, Math.min(3, (imgCfg.scale || 1) + delta)) });

  const onImgWheel = (e) => {
    if (!editOn || !img) return;
    e.preventDefault();
    onImgZoom(e.deltaY > 0 ? -0.05 : 0.05);
  };

  const bgSize = `${(imgCfg.scale || 1) * 100}%`;
  const bgPos = `${(imgCfg.x ?? 0.5) * 100}% ${(imgCfg.y ?? 0.5) * 100}%`;

  return (
    <div
      ref={(el) => {frameRef.current = el;if (exportRef) exportRef.current = el;}}
      data-edit-on={editOn ? '' : undefined}
      onWheel={onImgWheel}
      style={{
        position: 'relative', width: F.w, height: F.h,
        backgroundColor: img ? '#000' : '#e9e4d8',
        backgroundImage: img ? `url(${img})` : 'none',
        backgroundSize: img ? bgSize : 'cover',
        backgroundPosition: bgPos, backgroundRepeat: 'no-repeat',
        fontFamily: fontStack, overflow: 'hidden',
        cursor: editOn && img && imgDragging ? 'grabbing' : 'default', padding: "0px", borderWidth: "0px", borderStyle: "solid", margin: "-0.5px"
      }}>
      {!img && !((window.LAYOUTS_NO_MAIN_IMAGE || {})[layout]) &&
      <div
        onPointerDown={(e) => e.stopPropagation()}
        onClick={(e) => {e.stopPropagation();onUpload && onUpload();}}
        onDragOver={(e) => {e.preventDefault();e.currentTarget.style.background = 'rgba(181,138,84,.12)';}}
        onDragLeave={(e) => {e.currentTarget.style.background = 'transparent';}}
        onDrop={(e) => {e.preventDefault();e.currentTarget.style.background = 'transparent';const f = e.dataTransfer.files[0];if (f && f.type.startsWith('image/') && onUpload) onUpload(f);}}
        style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          color: 'rgba(40,30,20,.45)', fontSize: 28, fontWeight: 600, letterSpacing: -0.2, textAlign: 'center', padding: 40,
          cursor: 'pointer', border: '3px dashed rgba(40,30,20,.18)', boxSizing: 'border-box', transition: 'background .15s, border-color .15s' }}
        onMouseEnter={(e) => {e.currentTarget.style.borderColor = '#b58a54';e.currentTarget.style.color = '#b58a54';}}
        onMouseLeave={(e) => {e.currentTarget.style.borderColor = 'rgba(40,30,20,.18)';e.currentTarget.style.color = 'rgba(40,30,20,.45)';}}>
          <div style={{ fontSize: 48, marginBottom: 8 }}>↑</div>
          <div>Click or drop to upload</div>
          <div style={{ fontSize: 16, fontWeight: 400, marginTop: 4, opacity: .7 }}>Lifestyle / product photo</div>
        </div>
      }

      {img && editOn &&
      <div className="img-handle" style={{ position: 'absolute', top: 16, left: 16 }}
      onPointerDown={(e) => e.stopPropagation()}>
          <span className="img-drag" onPointerDown={onImgDrag} title="Drag to reposition image">✥ move image</span>
          <button onClick={(e) => {e.stopPropagation();onImgZoom(-0.1);}} title="Zoom out">−</button>
          <span style={{ minWidth: 32, textAlign: 'center', opacity: .8 }}>{Math.round((imgCfg.scale || 1) * 100)}%</span>
          <button onClick={(e) => {e.stopPropagation();onImgZoom(0.1);}} title="Zoom in">+</button>
          <button onClick={(e) => {e.stopPropagation();onImgChange && onImgChange({ x: 0.5, y: 0.5, scale: 1 });}} title="Reset" style={{ fontSize: 10 }}>⟲</button>
        </div>
      }

      {(() => {
        // Testimonial has its own layout components (LayoutCard/Editorial/Tabbed);
        // new ad types register theirs in window.ADTYPE_LAYOUTS.
        if (layout === 'card')
          return <LayoutCard variation={variation} pos={pos} sizes={sizes} F={F} frame={frame} editOn={editOn} onPosChange={onPosChange} onResize={onResize} accent={accent} fontStack={fontStack} fontH2={fontH2} />;
        if (layout === 'editorial')
          return <LayoutEditorial variation={variation} pos={pos} sizes={sizes} F={F} frame={frame} editOn={editOn} onPosChange={onPosChange} onResize={onResize} accent={accent} fontStack={fontStack} fontH2={fontH2} />;
        if (layout === 'tabbed')
          return <LayoutTabbed variation={variation} pos={pos} sizes={sizes} F={F} frame={frame} editOn={editOn} onPosChange={onPosChange} onResize={onResize} accent={accent} fontStack={fontStack} fontH2={fontH2} />;
        const L = (window.ADTYPE_LAYOUTS || {})[layout];
        if (L) return <L variation={variation} pos={pos} sizes={sizes} F={F} frame={frame} editOn={editOn} onPosChange={onPosChange} onResize={onResize} accent={accent} fontStack={fontStack} fontH2={fontH2} />;
        return null;
      })()}
    </div>);

}

    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => ImageStore.set(variation.id, e.target.result);
    r.readAsDataURL(file);
  };

  const exportPng = async (frame) => {
    const ref = frame === 'square' ? squareRef : storyRef;
    if (!ref.current) return;
    try {
      const dataUrl = await htmlToImage.toPng(ref.current, {
        pixelRatio: 2, width: FRAMES[frame].w, height: FRAMES[frame].h, cacheBust: true
      });
      const link = document.createElement('a');
      link.download = `${variation.id}-${variation.layout}-${FRAMES[frame].label.replace(':', 'x')}.png`;
      link.href = dataUrl;link.click();
    } catch (err) {console.error('Export failed', err);alert('Export failed — check console');}
  };

  const triggerDownload = (dataUrl, name) => {
    const link = document.createElement('a');
    link.download = name;
    link.href = dataUrl;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  };

    if (!squareRef.current || !storyRef.current) return;

      const [sq, st] = await Promise.all([
      htmlToImage.toPng(squareRef.current, { pixelRatio: 2, width: FRAMES.square.w, height: FRAMES.square.h, cacheBust: true }),
      htmlToImage.toPng(storyRef.current, { pixelRatio: 2, width: FRAMES.story.w, height: FRAMES.story.h, cacheBust: true })]
      );
      triggerDownload(sq, `${variation.id}-${variation.layout}-1x1.png`);
      await new Promise((r) => setTimeout(r, 600));
      triggerDownload(st, `${variation.id}-${variation.layout}-9x16.png`);

        </div>
        <div className="v-actions">
          <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }}
          onChange={(e) => {onFile(e.target.files[0]);e.target.value = '';}} />
          <button className="v-btn" onPointerDown={(e) => e.stopPropagation()} onClick={(e) => {e.stopPropagation();fileRef.current.click();}}>

function TweaksPanel({ state, setState, updateActiveBrand, onClose, onSelectBrand, onAddBrand, onDeleteBrand, onRenameBrand }) {
  const brand = activeBrandOf(state);
  const adType = state.activeAdType || 'testimonial';
  const [activeIdx, setActiveIdx] = React.useState(0);
  const [renameOn, setRenameOn] = React.useState(false);
  const [nameDraft, setNameDraft] = React.useState(brand.name);
  const csvRef = React.useRef(null);
  const imgRef = React.useRef(null);
  const [dragOver, setDragOver] = React.useState(false);

  React.useEffect(() => {
    if (activeIdx >= brand.variations.length) setActiveIdx(Math.max(0, brand.variations.length - 1));
  }, [brand.id, adType, brand.variations.length]);

  React.useEffect(() => { setRenameOn(false); setNameDraft(brand.name); }, [brand.id]);

  const persist = (next) => {
    setState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const update = (i, key, value) => {
    updateActiveBrand((b) => ({ variations: b.variations.map((v, j) => j === i ? { ...v, [key]: value } : v) }));
  };
  const setBrandField = (key, value) => updateActiveBrand(() => ({ [key]: value }));

  const addVariation = () => {
    const defaultLayout = (window.ADTYPE_DEFAULT_LAYOUT || {})[adType] || 'card';
    const nv = mkVariation({ layout: brand.variations[activeIdx]?.layout || defaultLayout });
    updateActiveBrand((b) => ({ variations: [...b.variations, nv] }));
    setActiveIdx(brand.variations.length);
  };
  const duplicateActive = () => {
    const v = brand.variations[activeIdx];
    const copy = { ...v, id: `v${Math.random().toString(36).slice(2, 8)}` };
    updateActiveBrand((b) => ({ variations: [...b.variations.slice(0, activeIdx + 1), copy, ...b.variations.slice(activeIdx + 1)] }));
    setActiveIdx(activeIdx + 1);
  };
  const deleteActive = () => {
    if (brand.variations.length <= 1) {alert('Keep at least one variation');return;}
    if (!confirm(`Delete variation ${activeIdx + 1}?`)) return;
    ImageStore.clear(brand.variations[activeIdx].id);
    ImageStore.clear(brand.variations[activeIdx].id + '__product');
    updateActiveBrand((b) => ({ variations: b.variations.filter((_, j) => j !== activeIdx) }));
    setActiveIdx(Math.max(0, activeIdx - 1));
  };
  const resetAll = () => {
    if (!confirm('Reset ALL brands and variations to defaults?')) return;
    persist(JSON.parse(JSON.stringify(DEFAULTS)));
    setActiveIdx(0);
  };

  const onCsvFile = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = (e) => {
      const rows = parseCsv(e.target.result);
      if (!rows.length) {alert('No rows found');return;}
      const first = rows[0].map((s) => s.toLowerCase().trim());
      const hasHeader = first.includes('layout') || first.includes('headline') || first.includes('body');
      // If header present, map columns by name; else assume order: layout, headline, body, author, rating, cta
      let idx = { layout: 0, headline: 1, body: 2, author: 3, rating: 4, cta: 5 };
      if (hasHeader) {
        idx = Object.fromEntries(Object.keys(idx).map((k) => [k, first.indexOf(k)]));
      }
      const data = hasHeader ? rows.slice(1) : rows;
      updateActiveBrand(() => ({
        variations: data.map((r, i) => {
          const get = (k) => idx[k] >= 0 ? r[idx[k]] || '' : '';
          const layout = (get('layout') || 'card').toLowerCase();
          const rating = parseFloat(get('rating')) || 5;

/* ───── Brand switcher (unchanged from AMA, reskinned) ───── */
function BrandSwitcher({ state, onSelect, onAdd, onRename, onDelete, editOn }) {
  const [renamingId, setRenamingId] = React.useState(null);
  const [draft, setDraft] = React.useState('');
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (renamingId && inputRef.current) {inputRef.current.focus();inputRef.current.select();}
  }, [renamingId]);

  const commitRename = () => {
    if (renamingId && draft.trim()) onRename(renamingId, draft.trim());
    setRenamingId(null);
  };

  return (
    <div style={{ position: 'fixed', top: 12, left: '50%', transform: 'translateX(-50%)',
      display: 'flex', alignItems: 'center', gap: 6, padding: 6,
      background: 'rgba(255,255,255,0.95)', border: '1px solid #e4e4e4', borderRadius: 999,
      boxShadow: '0 4px 16px rgba(0,0,0,.08)', zIndex: 50, fontSize: 13, backdropFilter: 'blur(8px)',
      maxWidth: 'calc(100vw - 32px)', overflow: 'auto' }}>
      <span style={{ padding: '0 10px', color: '#888', fontSize: 11, letterSpacing: .6, textTransform: 'uppercase' }}>Brand</span>
      {state.brands.map((b) => {
        const active = b.id === state.activeBrandId;
        if (renamingId === b.id) return (
          <input key={b.id} ref={inputRef} value={draft}
          onChange={(e) => setDraft(e.target.value)}
          onBlur={commitRename}
          onKeyDown={(e) => {if (e.key === 'Enter') commitRename();if (e.key === 'Escape') setRenamingId(null);}}
          style={{ padding: '6px 12px', borderRadius: 999, border: '1.5px solid #13100c', background: '#fff', fontSize: 13, outline: 'none', minWidth: 80 }} />);

        return (
          <button key={b.id}
          onClick={() => onSelect(b.id)}
          onDoubleClick={() => editOn && (setDraft(b.name), setRenamingId(b.id))}
          title={editOn ? 'Double-click to rename' : b.name}
          style={{ padding: '6px 12px', borderRadius: 999, border: 'none',
            background: active ? '#13100c' : 'transparent',
            color: active ? '#fff' : '#222', fontSize: 13, cursor: 'pointer', fontWeight: active ? 600 : 500, whiteSpace: 'nowrap' }}>
            {b.name}
          </button>);

      })}
      {editOn && <>
        <span style={{ width: 1, height: 16, background: '#e4e4e4' }} />
        <button onClick={onAdd} title="Add brand" style={{ padding: '6px 10px', border: 'none', background: 'transparent', cursor: 'pointer', color: '#444', fontSize: 15, lineHeight: 1 }}>+</button>
        {state.brands.length > 1 &&
        <button onClick={() => onDelete(state.activeBrandId)} title="Delete current brand" style={{ padding: '6px 10px', border: 'none', background: 'transparent', cursor: 'pointer', color: '#b33', fontSize: 13, lineHeight: 1 }}>✕</button>}
      </>}
    </div>);

}

/* CSV parser */
function parseCsv(text) {
  const rows = [];let row = [],cell = '',q = false;
  for (let i = 0; i < text.length; i++) {const c = text[i];
    if (q) {if (c === '"' && text[i + 1] === '"') {cell += '"';i++;} else if (c === '"') q = false;else cell += c;} else
    {if (c === '"') q = true;else if (c === ',') {row.push(cell);cell = '';} else
      if (c === '\n' || c === '\r') {if (c === '\r' && text[i + 1] === '\n') i++;row.push(cell);cell = '';if (row.some((x) => x.trim() !== '')) rows.push(row);row = [];} else
      cell += c;}}
  if (cell !== '' || row.length) {row.push(cell);if (row.some((x) => x.trim() !== '')) rows.push(row);}
  return rows;
}

              background: active ? '#13100c' : 'transparent',
              color: active ? '#fff' : (t.ready ? '#222' : '#aaa'),
              fontSize: 12.5, cursor: 'pointer', fontWeight: active ? 600 : 500, whiteSpace: 'nowrap',
              opacity: t.ready || active ? 1 : 0.7,
              display: 'inline-flex', alignItems: 'center', gap: 5 }}>
            {t.label}
            {!t.ready && <span style={{ fontSize: 9, padding: '1px 5px', borderRadius: 999,
              background: active ? 'rgba(255,255,255,.2)' : '#f0ece4', color: active ? '#fff' : '#8a7a5a',
              letterSpacing: .4, textTransform: 'uppercase', fontWeight: 600 }}>Soon</span>}
          </button>);
      })}
    </div>);
}

/* ───── Coming-soon placeholder artboard ───── */
function ComingSoonPlaceholder({ label }) {
  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column',
      alignItems: 'center', justifyContent: 'center', gap: 12, padding: 40,
      background: 'repeating-linear-gradient(45deg, #faf7f1, #faf7f1 14px, #f3ede1 14px, #f3ede1 28px)',
      border: '1px dashed #c9bfa8', borderRadius: 8, textAlign: 'center' }}>
      <div style={{ fontSize: 13, letterSpacing: .8, textTransform: 'uppercase', color: '#8a7a5a', fontWeight: 600 }}>Coming soon</div>
      <div style={{ fontFamily: '"Instrument Serif", serif', fontSize: 42, lineHeight: 1.05, color: '#13100c', maxWidth: 440 }}>
        {label}
      </div>
      <div style={{ fontSize: 13.5, color: '#6a6055', maxWidth: 380, lineHeight: 1.5 }}>
        Layouts for this ad type are next up. Testimonial is the only ad type wired in right now — keep editing there, and this one will slot in with its own variations and drag-&-drop positioning.
      </div>
    </div>);
}

/* ───── App ───── */
function App() {
  const [state, setState] = React.useState(TWEAKS);
  const [editOpen, setEditOpen] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditOpen(true);
      if (d.type === '__deactivate_edit_mode') setEditOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const brand = activeBrandOf(state);
  const adType = state.activeAdType || 'testimonial';
  const setActiveAdType = (id) => persist({ ...state, activeAdType: id });

  // Seed 3 starter variations when user visits a ready ad type bucket that's
  // empty for the active brand. Keeps the canvas populated without requiring
  // manual "+ Add variation" clicks.
  React.useEffect(() => {
    const meta = AD_TYPES.find((t) => t.id === adType);
    if (!meta || !meta.ready) return;
    if (adType === 'testimonial') return; // testimonial is seeded via initial TWEAKS
    const rawBrand = state.brands.find((b) => b.id === state.activeBrandId);
    if (!rawBrand) return;
    const mig = migrateBrand(rawBrand);
    const bucket = mig.adTypeVariations[adType] || [];
    if (bucket.length > 0) return;
    const defaultLayout = (window.ADTYPE_DEFAULT_LAYOUT || {})[adType] || 'card';
    const layoutList = (window.ADTYPE_LAYOUT_LIST || {})[adType] || [defaultLayout];
    const seeds = [0, 1, 2].map((i) => mkVariation({
      id: `v${Date.now().toString(36)}${i}${Math.random().toString(36).slice(2, 5)}`,
      layout: layoutList[i] || defaultLayout,
    }));
    const nextATV = { ...mig.adTypeVariations, [adType]: seeds };
    const nextBrands = state.brands.map((b) =>
      b.id === mig.id ? { ...mig, adTypeVariations: nextATV } : b
    );
    persist({ ...state, brands: nextBrands });
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [state.activeBrandId, adType]);

  const persist = (next) => {setState(next);window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');};

  /* updateActiveBrand accepts updates that reference `variations`. We
     transparently reroute those writes into adTypeVariations[adType] so the
     rest of the app doesn't have to know about ad types. Other fields pass
     through normally. */
  const updateActiveBrand = (updater) => {
    const next = { ...state, brands: state.brands.map((b) => {
      if (b.id !== brand.id) return b;
      const mig = migrateBrand(b);
      const patch = updater({ ...mig, variations: mig.adTypeVariations[adType] || [] });
      const { variations, adTypeVariations, ...rest } = patch;
      let nextATV = mig.adTypeVariations;
      if (variations) nextATV = { ...nextATV, [adType]: variations };
      if (adTypeVariations) nextATV = { ...nextATV, ...adTypeVariations };
      return { ...mig, ...rest, adTypeVariations: nextATV };
    }) };
    persist(next);
  };

  const setActiveBrandId = (id) => persist({ ...state, activeBrandId: id });

  const addBrand = () => {
    const b = defaultBrand({ name: `Brand ${state.brands.length + 1}` });
    persist({ ...state, brands: [...state.brands, b], activeBrandId: b.id });
  };
  const renameBrand = (id, name) => persist({ ...state, brands: state.brands.map((b) => b.id === id ? { ...b, name } : b) });
  const deleteBrand = (id) => {
    if (state.brands.length <= 1) {alert('Keep at least one brand');return;}
    if (!confirm(`Delete brand "${state.brands.find((b) => b.id === id).name}" and all its variations?`)) return;
    const b = migrateBrand(state.brands.find((x) => x.id === id));
    Object.values(b.adTypeVariations || {}).forEach((arr) =>
      (arr || []).forEach((v) => { ImageStore.clear(v.id); ImageStore.clear(v.id + '__product'); })
    );
    const brands = state.brands.filter((b) => b.id !== id);
    const activeBrandId = state.activeBrandId === id ? brands[0].id : state.activeBrandId;
    persist({ ...state, brands, activeBrandId });
  };

  const onPosChange = (variationId, frame, role, p, kind) => {
    updateActiveBrand((b) => ({
      variations: b.variations.map((v) => {
        if (v.id !== variationId) return v;
        const layout = v.layout || 'card';
        const curAll = v.pos || {};
        const curLayout = curAll[layout] || {};
        // SHARED across frames: write to one bucket per kind, not per-frame.
        const bucketKey = kind === 'size' ? '_size' :
        kind === 'img' ? '_img' :
        '_pos';
        if (kind === 'img') {
          return { ...v, pos: { ...curAll, [layout]: { ...curLayout, [bucketKey]: p } } };
        }
        const curBucket = curLayout[bucketKey] || (kind ? {} : (DEFAULT_POS[layout] && DEFAULT_POS[layout].square) || {});
        return { ...v, pos: { ...curAll, [layout]: { ...curLayout, [bucketKey]: { ...curBucket, [role]: p } } } };
      })
    }));
  };

  const onDelete = (i) => {
    if (brand.variations.length <= 1) {alert('Keep at least one variation');return;}
    if (!confirm(`Delete variation ${i + 1}?`)) return;
    ImageStore.clear(brand.variations[i].id);
    ImageStore.clear(brand.variations[i].id + '__product');
    updateActiveBrand((b) => ({ variations: b.variations.filter((_, j) => j !== i) }));
  };
  const onDuplicate = (i) => {
    const v = brand.variations[i];
    const copy = { ...v, id: `v${Math.random().toString(36).slice(2, 8)}` };
    updateActiveBrand((b) => ({ variations: [...b.variations.slice(0, i + 1), copy, ...b.variations.slice(i + 1)] }));
  };

  const pair = getTypePair(brand);
  const fontStack = pair.h1;
  const fontH2 = pair.h2;
  const accent = brand.accent || '#13100c';

  const activeAdTypeMeta = AD_TYPES.find((t) => t.id === adType) || AD_TYPES[0];
  const ready = activeAdTypeMeta.ready;

  return (
    <>
      <AdTypeTabs adType={adType} onSelect={setActiveAdType} />
      <DesignCanvas>
        <DCSection
          id="ads"
          title={`${brand.name} — ${activeAdTypeMeta.label}`}
          subtitle={!ready ?
          `${activeAdTypeMeta.label} layouts are in progress — coming soon.` :
          editOpen ?
          "Pick a layout in Tweaks · Drag pieces on any canvas · Upload per-variation images · Export PNG at 1:1 or 9:16" :
          "Turn on Tweaks to pick an ad type, switch brands, upload images, edit copy, or import a CSV"}>
          {ready ?
            brand.variations.map((v, i) =>
              <DCArtboard key={v.id} id={v.id} label={`V${i + 1} · ${v.layout}`} width={720} height={580}>
                <VariationCard
                  variation={v} index={i} editOn={editOpen}
                  fontStack={fontStack} fontH2={fontH2} accent={accent}
                  onPosChange={onPosChange}
                  onDelete={() => onDelete(i)}
                  onDuplicate={() => onDuplicate(i)} />
              </DCArtboard>
            )
          :
            <DCArtboard id={`${adType}-placeholder`} label={`${activeAdTypeMeta.label} · coming soon`} width={720} height={580}>
              <ComingSoonPlaceholder label={activeAdTypeMeta.label} />
            </DCArtboard>
          }
        </DCSection>
      </DesignCanvas>
      {editOpen && <TweaksPanel state={state} setState={setState} updateActiveBrand={updateActiveBrand}
        onClose={() => setEditOpen(false)}
        onSelectBrand={setActiveBrandId} onAddBrand={addBrand} onDeleteBrand={deleteBrand} onRenameBrand={renameBrand} />}
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body></html>
