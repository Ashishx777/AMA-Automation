  .tw-tab.add:hover{color:#fff;background:rgba(255,255,255,.08)}

  .ad-hot{position:absolute;cursor:grab;user-select:none;z-index:2}

/* Images are session-only: keyed by variation id, stored in plain JS memory
   (NOT in EDITMODE, because base64 would bloat disk). */
/* Images are persisted to IndexedDB (keyed by variation id). Kept out of
   EDITMODE because base64 strings would balloon the source file. The first
   render hydrates from disk; subsequent set/clear writes asynchronously. */
const ImageStore = {
  _map: {},
  _ready: false,
  _readyPromise: null,
  set(id, dataUrl) {
    this._map[id] = dataUrl;
    this._emit();
    this._idbSet(id, dataUrl);
  },
  get(id) {return this._map[id];},
  clear(id) {
    delete this._map[id];
    this._emit();
    this._idbDelete(id);
  },
  _subs: new Set(),
  _emit() {this._subs.forEach((fn) => fn());},
  subscribe(fn) {this._subs.add(fn);return () => this._subs.delete(fn);},

  // ---------- IndexedDB plumbing ----------
  _DB: 'ama-ad-images',
  _STORE: 'imgs',
  _open() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this._DB, 1);
      req.onupgradeneeded = () => req.result.createObjectStore(this._STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
  },
  async _idbSet(id, dataUrl) {
    try {
      const db = await this._open();
      const tx = db.transaction(this._STORE, 'readwrite');
      tx.objectStore(this._STORE).put(dataUrl, id);
    } catch (e) {console.warn('ImageStore: idb set failed', e);}
  },
  async _idbDelete(id) {
    try {
      const db = await this._open();
      const tx = db.transaction(this._STORE, 'readwrite');
      tx.objectStore(this._STORE).delete(id);
    } catch (e) {console.warn('ImageStore: idb delete failed', e);}
  },
  async hydrate() {
    if (this._readyPromise) return this._readyPromise;
    this._readyPromise = (async () => {
      try {
        const db = await this._open();
        const tx = db.transaction(this._STORE, 'readonly');
        const store = tx.objectStore(this._STORE);
        const keysReq = store.getAllKeys();
        const valsReq = store.getAll();
        await new Promise((res, rej) => {
          tx.oncomplete = res;
          tx.onerror = () => rej(tx.error);
        });
        const keys = keysReq.result || [];
        const vals = valsReq.result || [];
        keys.forEach((k, i) => {this._map[k] = vals[i];});
      } catch (e) {console.warn('ImageStore: hydrate failed', e);}
      this._ready = true;
      this._emit();
    })();
    return this._readyPromise;
  }
};
ImageStore.hydrate();

// Patched for porcellia-ads-skill: when the EDITMODE block has been pre-
// populated by the skill, each variation can carry _seedSquare and
// _seedStory base64 dataURLs. Push them into ImageStore so the canvas
// renders with copy AND images already in place on first paint.
(function seedFromEditmode() {
  try {
    const data = typeof TWEAKS !== 'undefined' ? TWEAKS : null;
    if (!data || !Array.isArray(data.brands)) return;
    let count = 0;
    for (const b of data.brands) {
      for (const v of (b.variations || [])) {
        if (v._seedSquare) { ImageStore.set(v.id + ':square', v._seedSquare); count++; }
        if (v._seedStory)  { ImageStore.set(v.id + ':story',  v._seedStory);  count++; }
        if (!v._seedSquare && !v._seedStory && v._seedImage) {
          // Single-image fallback for variations where 9:16 isn't separate.
          ImageStore.set(v.id, v._seedImage); count++;

      }
    }
    if (count) console.log('[porcellia-ads-skill] seeded ' + count + ' images from EDITMODE');
  } catch (e) { console.warn('[porcellia-ads-skill] seed failed', e); }
})();

/* ───────── Draggable copy hotspot ───────── */
function DraggableBlock({ frac, onChange, frameW, frameH, editOn, children, handleLabel }) {
  const ref = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);

  const onPointerDown = (e) => {
    if (!editOn) return;
    e.preventDefault();
    const el = ref.current;
    const parent = el.parentElement;
    const parentRect = parent.getBoundingClientRect();
    const scale = parentRect.width / frameW;
    const elRect = el.getBoundingClientRect();
    const offX = e.clientX - elRect.left;
    const offY = e.clientY - elRect.top;
    setDragging(true);

    const onMove = (ev) => {
      const px = (ev.clientX - parentRect.left - offX) / scale;
      const py = (ev.clientY - parentRect.top - offY) / scale;
      // Clamp so block stays inside frame (approx — use rendered rect)
      const blockW = elRect.width / scale;
      const blockH = elRect.height / scale;
      const cx = Math.max(0, Math.min(frameW - blockW, px));
      const cy = Math.max(0, Math.min(frameH - blockH, py));
      onChange({ x: cx / frameW, y: cy / frameH });
    };
    const onUp = () => {
      setDragging(false);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  };

  return (
    <div
      ref={ref}
      className={`ad-hot ${dragging ? 'dragging' : ''}`}
      style={{
        left: `${frac.x * 100}%`,
        top: `${frac.y * 100}%`,
        width: `${COPY_WIDTH_FRAC * 100}%`,
        zIndex: 2
      }}
      onPointerDown={onPointerDown}>
      
      <div className="ad-handle">{handleLabel}</div>
      {children}
    </div>);

}

/* ───────── Draggable + resizable image ───────── */
function DraggableImage({ src, frameW, frameH, editOn, transform, onTransformChange }) {
  const [natural, setNatural] = React.useState(null); // {w,h}
  const [mode, setMode] = React.useState(null); // 'drag' | 'resize-br' | 'resize-tl' | 'resize-tr' | 'resize-bl' | null
  const elRef = React.useRef(null);

  React.useEffect(() => {
    if (!src) {setNatural(null);return;}
    const im = new Image();
    im.onload = () => setNatural({ w: im.naturalWidth, h: im.naturalHeight });
    im.src = src;
  }, [src]);

  // Compute the effective transform: explicit transform if set, else cover-fit default.
  const effective = React.useMemo(() => {
    if (transform) return transform;
    if (!natural) return null;
    const ar = natural.w / natural.h;
    const fAr = frameW / frameH;
    let w, h, x, y;
    if (ar > fAr) {
      // image wider than frame — fill width, crop top/bottom (cover)
      w = 1;h = frameW / frameH / ar;
      x = 0;y = (1 - h) / 2;
    } else {
      // image taller than frame — fill height, crop sides (cover)
      h = 1;w = ar * (frameH / frameW);
      y = 0;x = (1 - w) / 2;
    }
    return { x, y, w, h };
  }, [transform, natural, frameW, frameH]);

  if (!effective) return null;

  const startDrag = (e, kind) => {
    if (!editOn) return;
    e.preventDefault();
    e.stopPropagation();
    const parentRect = elRef.current.parentElement.getBoundingClientRect();
    const scale = parentRect.width / frameW;
    const startX = e.clientX;
    const startY = e.clientY;
    const start = { ...effective };
    const ar = start.w / start.h;
    setMode(kind);

    const onMove = (ev) => {
      const dx = (ev.clientX - startX) / (scale * frameW);
      const dy = (ev.clientY - startY) / (scale * frameH);
      let next = { ...start };
      if (kind === 'drag') {
        next.x = start.x + dx;
        next.y = start.y + dy;
      } else {
        // resize from a corner; keep aspect ratio, anchor at opposite corner
        // dominant axis = larger absolute change in frame-relative dx*frameW vs dy*frameH
        const ddx = Math.abs(dx);
        const ddy = Math.abs(dy);
        let dw, dh;
        if (ddx * frameW > ddy * frameH) {
          dw = kind === 'resize-br' || kind === 'resize-tr' ? dx : -dx;
          dh = dw / ar;
        } else {
          dh = kind === 'resize-br' || kind === 'resize-bl' ? dy : -dy;
          dw = dh * ar;
        }
        let newW = Math.max(0.05, start.w + dw);
        let newH = Math.max(0.05, start.h + dh);
        // keep aspect via newW
        newH = newW / ar;
        if (kind === 'resize-br') {
          next.w = newW;next.h = newH;
        } else if (kind === 'resize-tl') {
          next.x = start.x + (start.w - newW);
          next.y = start.y + (start.h - newH);
          next.w = newW;next.h = newH;
        } else if (kind === 'resize-tr') {
          next.y = start.y + (start.h - newH);
          next.w = newW;next.h = newH;
        } else if (kind === 'resize-bl') {
          next.x = start.x + (start.w - newW);
          next.w = newW;next.h = newH;
        }
      }
      onTransformChange(next);
    };
    const onUp = () => {
      setMode(null);
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    };
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  };

  const handleStyle = {
    position: 'absolute', width: 28, height: 28, borderRadius: '50%',
    background: '#c96442', border: '3px solid #fff',
    boxShadow: '0 2px 8px rgba(0,0,0,.3)', cursor: 'nwse-resize',
    zIndex: 3, display: editOn ? 'block' : 'none'
  };

  return (
    <div
      ref={elRef}
      onPointerDown={(e) => startDrag(e, 'drag')}
      style={{ ...{
          position: 'absolute',
          left: `${effective.x * 100}%`,
          top: `${effective.y * 100}%`,
          width: `${effective.w * 100}%`,
          height: `${effective.h * 100}%`,
          cursor: editOn ? mode === 'drag' ? 'grabbing' : 'grab' : 'default',
          outline: editOn ? '2px dashed rgba(201,100,66,.7)' : 'none',
          outlineOffset: -2,
          zIndex: 0
        }, width: "1080px", padding: "0px", margin: "-5.01953px 0px 0px -110px" }}>
      <img
        src={src}
        draggable={false}
        style={{ width: '100%', height: '100%', objectFit: 'fill', display: 'block', userSelect: 'none', pointerEvents: 'none' }} />
      
      {editOn &&
      <>
          <div style={{ ...handleStyle, left: -14, top: -14, cursor: 'nwse-resize' }}
        onPointerDown={(e) => startDrag(e, 'resize-tl')} />
          <div style={{ ...handleStyle, right: -14, top: -14, cursor: 'nesw-resize' }}
        onPointerDown={(e) => startDrag(e, 'resize-tr')} />
          <div style={{ ...handleStyle, left: -14, bottom: -14, cursor: 'nesw-resize' }}
        onPointerDown={(e) => startDrag(e, 'resize-bl')} />
          <div style={{ ...handleStyle, right: -14, bottom: -14, cursor: 'nwse-resize' }}
        onPointerDown={(e) => startDrag(e, 'resize-br')} />
        </>
      }
    </div>);

}

/* ───────── Tweaks panel ───────── */
function TweaksPanel({ state, setState, updateActiveBrand, onClose }) {
  const brand = activeBrandOf(state);
  const [activeIdx, setActiveIdx] = React.useState(0);
  const csvRef = React.useRef(null);
  const imgRef = React.useRef(null);
  const [dragOver, setDragOver] = React.useState(false);

  // Clamp active index when switching brands or deleting variations.
  React.useEffect(() => {
    if (activeIdx >= brand.variations.length) setActiveIdx(Math.max(0, brand.variations.length - 1));
  }, [brand.id, brand.variations.length]);

  const persist = (next) => {
    setState(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  const update = (i, key, value) => {
    updateActiveBrand((b) => ({
      variations: b.variations.map((v, j) => j === i ? { ...v, [key]: value } : v)
    }));
  };

  const setBrandField = (key, value) => {
    updateActiveBrand(() => ({ [key]: value }));
  };

  const addVariation = () => {
    const id = `v${Date.now().toString(36)}`;
    updateActiveBrand((b) => ({
      variations: [...b.variations, { id, c1: '', c2: '', c3: '' }]
    }));
    setActiveIdx(brand.variations.length); // new one at end
  };

  const duplicateActive = () => {
    const v = brand.variations[activeIdx];
    const id = `v${Date.now().toString(36)}`;
    const copy = { ...v, id };
    updateActiveBrand((b) => ({
      variations: [...b.variations.slice(0, activeIdx + 1), copy, ...b.variations.slice(activeIdx + 1)]
    }));
    setActiveIdx(activeIdx + 1);
  };

  const deleteActive = () => {
    if (brand.variations.length <= 1) {alert('Keep at least one variation');return;}
    if (!confirm(`Delete variation ${activeIdx + 1}?`)) return;
    const v = brand.variations[activeIdx];
    ImageStore.clear(v.id);
    updateActiveBrand((b) => ({ variations: b.variations.filter((_, j) => j !== activeIdx) }));
    setActiveIdx(Math.max(0, activeIdx - 1));
  };

  const resetAll = () => {
    if (!confirm('Reset ALL brands and variations to defaults? This cannot be undone.')) return;
    persist(JSON.parse(JSON.stringify(DEFAULTS)));
    setActiveIdx(0);
  };

  const onCsvFile = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const rows = parseCsv(e.target.result);
      if (rows.length === 0) {alert('No rows found');return;}
      const first = rows[0].map((s) => s.toLowerCase().trim());
      const hasHeader = first.includes('c1') || first.includes('context') || first.includes('context_bar');
      const data = hasHeader ? rows.slice(1) : rows;
      updateActiveBrand(() => ({
        variations: data.map((r, i) => ({
          id: `v${Date.now().toString(36)}${i}`,
          c1: r[0] || '', c2: r[1] || '', c3: r[2] || ''
        }))
      }));
      setActiveIdx(0);
    };
    reader.readAsText(file);
  };

  const onImgFile = (file) => {
    if (!file) return;
    const v = brand.variations[activeIdx];
    const reader = new FileReader();
    reader.onload = (e) => ImageStore.set(v.id, e.target.result);
    reader.readAsDataURL(file);
  };

  const onDrop = (e) => {
    e.preventDefault();
    setDragOver(false);
    const f = e.dataTransfer.files[0];
    if (!f) return;
    if (f.type === 'text/csv' || f.name.endsWith('.csv')) onCsvFile(f);else
    if (f.type.startsWith('image/')) onImgFile(f);
  };

  const v = brand.variations[activeIdx];
  if (!v) return null;

  return (
    <div className="tw-panel">
      <div className="tw-head">
        <div className="tw-title">Tweaks · {brand.name}</div>
        <button className="tw-close" onClick={onClose}>×</button>
      </div>

      {/* Brand-level controls */}
      <div className="tw-body" style={{ borderBottom: '1px solid #eee', paddingBottom: 12 }}>
        <div className="tw-card" style={{ background: '#fafafa' }}>
          <div className="tw-card-head">
            <div className="tw-card-title" style={{ fontSize: 11, letterSpacing: 0.6, textTransform: 'uppercase', color: '#888' }}>Brand</div>
          </div>
          <div className="tw-field">
            <label className="tw-label">Brand name</label>
            <input className="tw-textarea" style={{ minHeight: 0, height: 34, fontFamily: 'inherit' }}
            value={brand.name}
            onChange={(e) => setBrandField('name', e.target.value)} />
          </div>
          <div className="tw-field" style={{ marginBottom: 0 }}>
            <label className="tw-label">Font family</label>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
              {FONTS.map((f) =>
              <button key={f.id}
              onClick={() => setBrandField('font', f.id)}
              style={{
                padding: '6px 10px',
                borderRadius: 6,
                border: brand.font === f.id ? '1.5px solid #0b0b0b' : '1px solid #ddd',
                background: brand.font === f.id ? '#0b0b0b' : '#fff',
                color: brand.font === f.id ? '#fff' : '#222',
                fontFamily: f.stack,
                fontSize: 12,
                cursor: 'pointer'
              }}>{f.label}</button>
              )}
            </div>
          </div>
        </div>
      </div>

      <div className="tw-toolbar">
        <input ref={csvRef} type="file" accept=".csv,text/csv" style={{ display: 'none' }}
        onChange={(e) => onCsvFile(e.target.files[0])} />
        <button className="tw-tool" onClick={() => csvRef.current.click()}>⤓ Import CSV</button>
        <button className="tw-tool" onClick={addVariation}>+ Add</button>
        <button className="tw-tool" onClick={duplicateActive}>⧉ Duplicate</button>
        <button className="tw-tool danger" onClick={deleteActive}>✕ Delete</button>
      </div>

      <div className="tw-tabs">
        {brand.variations.map((_, i) =>
        <button key={i}
        className={`tw-tab ${i === activeIdx ? 'active' : ''}`}
        onClick={() => setActiveIdx(i)}>V{i + 1}</button>
        )}
        <button className="tw-tab add" onClick={addVariation}>+</button>
      </div>

      <div className="tw-body">
        <div className="tw-card">
          <div className="tw-card-head">
            <div className="tw-card-title">Variation {activeIdx + 1}</div>
          </div>

          <div className="tw-field">
            <label className="tw-label">Product image (session-only)</label>
            <input ref={imgRef} type="file" accept="image/*" style={{ display: 'none' }}
            onChange={(e) => onImgFile(e.target.files[0])} />
            {ImageStore.get(v.id) ?
            <div className="tw-thumb" style={{ backgroundImage: `url(${ImageStore.get(v.id)})` }}>
                <button className="tw-thumb-replace" onClick={() => imgRef.current.click()}>Replace</button>
              </div> :
            <div
              className={`tw-drop ${dragOver ? 'over' : ''}`}
              onClick={() => imgRef.current.click()}
              onDragOver={(e) => {e.preventDefault();setDragOver(true);}}
              onDragLeave={() => setDragOver(false)}
              onDrop={onDrop}>
                Drop image or CSV here
                <div className="tw-drop-sub">Images are session-only · CSV replaces this brand's variations</div>
              </div>
            }
          </div>

          <div className="tw-field">
            <label className="tw-label">Component 1 · Context bar</label>
            <textarea className="tw-textarea" value={v.c1}
            onChange={(e) => update(activeIdx, 'c1', e.target.value)} />
          </div>

          <div className="tw-field">
            <label className="tw-label">Component 2 · Question</label>
            <textarea className="tw-textarea" value={v.c2}
            onChange={(e) => update(activeIdx, 'c2', e.target.value)} />
          </div>

          <div className="tw-field" style={{ marginBottom: 0 }}>
            <label className="tw-label">Component 3 · Answer</label>
            <textarea className="tw-textarea" style={{ minHeight: 84 }} value={v.c3}
            onChange={(e) => update(activeIdx, 'c3', e.target.value)} />
          </div>

          <div className="tw-hint">
            Drag the Q-block and A-block directly on the canvas to reposition.
            Each aspect ratio has its own positions.
          </div>
        </div>
      </div>

      <div className="tw-footer">
        <span style={{ flex: 1 }}>Copy, font + positions save to disk</span>
        <button onClick={resetAll}>Reset all</button>
      </div>
    </div>);
}

  }, [renamingId]);

    if (renamingId && draft.trim()) onRename(renamingId, draft.trim());
    setRenamingId(null);
  };

  return (
    <div style={{
      position: 'fixed', top: 12, left: '50%', transform: 'translateX(-50%)',

        const active = b.id === state.activeBrandId;
        if (renamingId === b.id) {
          return (
            <input key={b.id} ref={inputRef} value={draft}
            onChange={(e) => setDraft(e.target.value)}
            onBlur={commitRename}

            style={{
              padding: '6px 12px', borderRadius: 999,
              border: '1.5px solid #0b0b0b', background: '#fff',
              fontSize: 13, outline: 'none', minWidth: 80
            }} />);

        }
        return (
          <button key={b.id}
          onClick={() => onSelect(b.id)}

          style={{
            padding: '6px 12px', borderRadius: 999, border: 'none',
            background: active ? '#0b0b0b' : 'transparent',
            color: active ? '#fff' : '#222',

          }}>

      })}
      {editOn && <>
        <span style={{ width: 1, height: 16, background: '#e4e4e4' }} />
        <button onClick={onUndo} disabled={!canUndo} title="Undo (Ctrl/Cmd+Z)"
        style={{ padding: '6px 10px', border: 'none', background: 'transparent', cursor: canUndo ? 'pointer' : 'not-allowed', color: canUndo ? '#444' : '#bbb', fontSize: 14, lineHeight: 1 }}>↶</button>
        <button onClick={onRedo} disabled={!canRedo} title="Redo (Ctrl/Cmd+Shift+Z)"
        style={{ padding: '6px 10px', border: 'none', background: 'transparent', cursor: canRedo ? 'pointer' : 'not-allowed', color: canRedo ? '#444' : '#bbb', fontSize: 14, lineHeight: 1 }}>↷</button>
        <span style={{ width: 1, height: 16, background: '#e4e4e4' }} />
        <button onClick={onAdd} title="Add brand"
        style={{ padding: '6px 10px', border: 'none', background: 'transparent', cursor: 'pointer', color: '#444', fontSize: 15, lineHeight: 1 }}>+</button>
        {state.brands.length > 1 &&
        <button onClick={() => onDelete(state.activeBrandId)} title="Delete current brand"
        style={{ padding: '6px 10px', border: 'none', background: 'transparent', cursor: 'pointer', color: '#b33', fontSize: 13, lineHeight: 1 }}>✕</button>
        }
      </>}
    </div>);

}

/* Very small CSV parser — handles quoted fields with commas + escaped quotes. */
function parseCsv(text) {
  const rows = [];
  let row = [],cell = '',q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"' && text[i + 1] === '"') {cell += '"';i++;} else
      if (c === '"') q = false;else
      cell += c;
    } else {
      if (c === '"') q = true;else
      if (c === ',') {row.push(cell);cell = '';} else
      if (c === '\n' || c === '\r') {
        if (c === '\r' && text[i + 1] === '\n') i++;
        row.push(cell);cell = '';
        if (row.some((x) => x.trim() !== '')) rows.push(row);
        row = [];
      } else cell += c;
    }
  }
  if (cell !== '' || row.length) {row.push(cell);if (row.some((x) => x.trim() !== '')) rows.push(row);}
  return rows;
}

/* ───────── App ───────── */
function App() {
  const [state, _setState] = React.useState(TWEAKS);
  const [editOpen, setEditOpen] = React.useState(false);

  // Undo/redo history (snapshots of full state). Capped to keep memory sane.
  const historyRef = React.useRef({ past: [], future: [], txKey: null, txTimer: null });
  const HISTORY_CAP = 100;

  const persistToHost = (next) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  /* setState({ next, txKey?, commit? })
     - txKey: if provided, coalesces consecutive calls with the SAME key into a
       single history entry. The first call snapshots prev into past; subsequent
       calls update state without pushing.
     - commit: true ends the current transaction immediately.
     - With no opts: a normal discrete history entry. */
  const setState = React.useCallback((next, opts) => {
    _setState((prev) => {
      const nv = typeof next === 'function' ? next(prev) : next;
      const h = historyRef.current;
      const txKey = opts && opts.txKey;
      const commit = opts && opts.commit;

      if (txKey) {
        if (h.txKey !== txKey) {
          // Starting a new transaction — snapshot prev.
          h.past.push(prev);
          if (h.past.length > HISTORY_CAP) h.past.shift();
          h.future = [];
          h.txKey = txKey;
        }
        // Auto-commit after a short idle (typing pause)
        if (h.txTimer) clearTimeout(h.txTimer);
        h.txTimer = setTimeout(() => {h.txKey = null;h.txTimer = null;}, 600);
      } else {
        // Discrete change — close any open transaction and push.
        h.txKey = null;
        if (h.txTimer) {clearTimeout(h.txTimer);h.txTimer = null;}
        h.past.push(prev);
        if (h.past.length > HISTORY_CAP) h.past.shift();
        h.future = [];
      }
      if (commit) {h.txKey = null;if (h.txTimer) {clearTimeout(h.txTimer);h.txTimer = null;}}
      persistToHost(nv);
      return nv;
    });
  }, []);

  const endTx = React.useCallback(() => {
    const h = historyRef.current;
    h.txKey = null;
    if (h.txTimer) {clearTimeout(h.txTimer);h.txTimer = null;}
  }, []);

  const undo = React.useCallback(() => {
    _setState((prev) => {
      const h = historyRef.current;
      h.txKey = null;
      if (h.txTimer) {clearTimeout(h.txTimer);h.txTimer = null;}
      if (h.past.length === 0) return prev;
      const last = h.past.pop();
      h.future.push(prev);
      persistToHost(last);
      return last;
    });
  }, []);

  const redo = React.useCallback(() => {
    _setState((prev) => {
      const h = historyRef.current;
      h.txKey = null;
      if (h.txTimer) {clearTimeout(h.txTimer);h.txTimer = null;}
      if (h.future.length === 0) return prev;
      const next = h.future.pop();
      h.past.push(prev);
      persistToHost(next);
      return next;
    });
  }, []);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditOpen(true);
      if (d.type === '__deactivate_edit_mode') setEditOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Keyboard: Cmd/Ctrl+Z undo, Cmd+Shift+Z or Ctrl+Y redo.
  React.useEffect(() => {
    const onKey = (e) => {
      const tag = e.target && e.target.tagName || '';
      const editable = tag === 'INPUT' || tag === 'TEXTAREA' || e.target && e.target.isContentEditable;
      if (editable) return;
      const meta = e.metaKey || e.ctrlKey;
      if (!meta) return;
      const k = e.key.toLowerCase();
      if (k === 'z' && !e.shiftKey) {e.preventDefault();undo();} else
      if (k === 'z' && e.shiftKey || k === 'y') {e.preventDefault();redo();}
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [undo, redo]);

  const brand = activeBrandOf(state);

  // Update ONLY the active brand; leaves the rest alone.
  // Functional setState avoids stale closures when several edits fire quickly.
  const updateActiveBrand = (updater) => {
    setState((prev) => {
      const activeId = prev.activeBrandId;
      return {
        ...prev,
        brands: prev.brands.map((b) => b.id === activeId ? { ...b, ...updater(b) } : b)
      };
    });
  };

  const setActiveBrandId = (id) => {
    setState((prev) => ({ ...prev, activeBrandId: id }));
  };

  const addBrand = () => {
    setState((prev) => {
      const b = defaultBrand({ name: `Brand ${prev.brands.length + 1}` });
      return { ...prev, brands: [...prev.brands, b], activeBrandId: b.id };
    });
  };

  const renameBrand = (id, name) => {
    setState((prev) => ({
      ...prev,
      brands: prev.brands.map((b) => b.id === id ? { ...b, name } : b)
    }));
  };

  const deleteBrand = (id) => {
    if (state.brands.length <= 1) {alert('Keep at least one brand');return;}
    if (!confirm(`Delete brand "${state.brands.find((b) => b.id === id).name}" and all its variations?`)) return;
    // Clean up any image references
    const b = state.brands.find((x) => x.id === id);
    (b.variations || []).forEach((v) => ImageStore.clear(v.id));
    const brands = state.brands.filter((b) => b.id !== id);
    setState((prev) => {
      const remaining = prev.brands.filter((b) => b.id !== id);
      if (remaining.length === 0) return prev;
      const activeBrandId = prev.activeBrandId === id ? remaining[0].id : prev.activeBrandId;
      return { ...prev, brands: remaining, activeBrandId };
    });
  };

  const onPosChange = (variationId, frame, role, p, opts) => {
    updateActiveBrand((b) => ({
      variations: b.variations.map((v) => {
        if (v.id !== variationId) return v;
        const curPos = v.pos || {};
        const curFrame = curPos[frame] || DEFAULT_POS[frame];
        return { ...v, pos: { ...curPos, [frame]: { ...curFrame, [role]: p } } };
      })
    }), opts || { txKey: `pos:${variationId}:${frame}:${role}` });
  };

  const onImgTChange = (variationId, frame, t, opts) => {
    updateActiveBrand((b) => ({
      variations: b.variations.map((v) => {
        if (v.id !== variationId) return v;
        return { ...v, imgT: { ...(v.imgT || {}), [frame]: t } };
      })
    }), opts || { txKey: `imgT:${variationId}:${frame}` });
  };

  const onUploadImage = (variationId, file) => {
    const reader = new FileReader();
    reader.onload = (e) => ImageStore.set(variationId, e.target.result);
    reader.readAsDataURL(file);
  };

  const onDelete = (i) => {
    if (brand.variations.length <= 1) {alert('Keep at least one variation');return;}
    if (!confirm(`Delete variation ${i + 1}?`)) return;
    ImageStore.clear(brand.variations[i].id);
    updateActiveBrand((b) => ({ variations: b.variations.filter((_, j) => j !== i) }));
  };

  const onDuplicate = (i) => {
    const v = brand.variations[i];
    const id = `v${Date.now().toString(36)}`;
    updateActiveBrand((b) => ({
      variations: [...b.variations.slice(0, i + 1), { ...v, id }, ...b.variations.slice(i + 1)]
    }));
  };

  const font = getFont(brand.font);

  return (
    <>
      <BrandSwitcher
        state={state}
        onUndo={undo}
        onRedo={redo}
        canUndo={historyRef.current.past.length > 0}
        canRedo={historyRef.current.future.length > 0}
        onSelect={setActiveBrandId}
        onAdd={addBrand}
        onRename={renameBrand}
        onDelete={deleteBrand}
        editOn={editOpen} />
      
      <DesignCanvas>
        <DCSection
          id="ads"
          title={`${brand.name} — Ad Template`}
          subtitle={
          editOpen ?
          "Drag the Q / A blocks on any canvas to reposition · Upload images per variation · Export PNG at 1:1 or 9:16" :
          "Turn on Tweaks to upload images, edit copy, drag components, or import a CSV"
          }>
          
          {brand.variations.map((v, i) =>
          <DCArtboard
            key={v.id}
            id={v.id}
            label={`V${i + 1}`}
            width={720}
            height={580}>
            
              <VariationCard
              variation={v}
              index={i}
              editOn={editOpen}
              font={font}
              onPosChange={onPosChange}
              onImgTChange={onImgTChange}
              onUploadImage={onUploadImage}
              onDelete={() => onDelete(i)}
              onDuplicate={() => onDuplicate(i)} />
            
            </DCArtboard>
          )}
        </DCSection>
      </DesignCanvas>
      {editOpen && <TweaksPanel state={state} setState={setState} updateActiveBrand={updateActiveBrand} onClose={() => setEditOpen(false)} />}
    </>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// ─── porcellia-ads-skill: headless-export hooks ─────────────────────────────
// These globals let an external renderer (Browserless / Playwright / etc.)
// drive PNG export without clicking per-card buttons. The skill's renderer:
//   1. Loads this HTML with EDITMODE pre-populated (incl. _seedSquare/Story).
//   2. Polls window.__porcelliaReady() until canvases mount + images decode.
//   3. Calls window.__exportAll() to get all 1:1 + 9:16 PNGs as dataURLs.
window.__porcelliaReady = function () {
  const nodes = document.querySelectorAll('[data-export-canvas]');
  if (nodes.length === 0) return false;
  // Every <img> inside an export canvas must be decoded before capture.
  const imgs = document.querySelectorAll('[data-export-canvas] img');
  for (const im of imgs) {
    if (!im.complete || im.naturalWidth === 0) return false;
  }
  return true;
};

window.__exportAll = async function (opts) {
  opts = opts || {};
  const pixelRatio = opts.pixelRatio || 2;
  if (typeof htmlToImage === 'undefined') throw new Error('htmlToImage not loaded');
  const FRAME_PX = { square: { w: 1080, h: 1080 }, story: { w: 1080, h: 1920 } };
  const nodes = Array.from(document.querySelectorAll('[data-export-canvas]'));
  const out = [];
  for (const node of nodes) {
    const id = node.getAttribute('data-variation-id');
    const frame = node.getAttribute('data-frame');
    const px = FRAME_PX[frame];
    const dataUrl = await htmlToImage.toPng(node, {
      pixelRatio,
      width: px.w,
      height: px.h,
      cacheBust: true,
    });
    out.push({ id, frame, dataURL: dataUrl });
  }
  return out;
};
</script>
